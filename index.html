function coachStart(){
  if(!coachInterviewDone()){
    const p=coachProfile();
    const next=COACH_Q.find(q=>!p[q.k]);
    coachHist.push({role:'assistant',text:next.q});
    saveCoach();
  } else {
    coachHist.push({role:'assistant',text:'¡Qué bueno verte de nuevo! ¿Cómo venís hoy? ¿En qué andás?'});
    saveCoach();
  }
  renderCoach();
}

async function sendCoach(){
  const inp=document.getElementById('coach-inp');if(!inp||!inp.value.trim())return;
  const key=aiKey();if(!key){tst('⚠️ Configurá la IA en el chat');return;}
  const txt=inp.value.trim();inp.value='';
  coachHist.push({role:'user',text:txt});
  saveCoach();

  // Si estamos en la entrevista inicial, guardamos la respuesta y seguimos preguntando
  if(!coachInterviewDone()){
    const p=coachProfile();
    const pending=COACH_Q.find(q=>!p[q.k]);
    if(pending){
      p[pending.k]=txt;
      S.s('coachProfile1',p);
      // guardar en memoria global también para que el chat lo sepa
      if(pending.k==='trabajo'||pending.k==='objetivo'){
        const mem=S.g('userMem1',[]);mem.push({t:'La persona '+(pending.k==='trabajo'?'trabaja en/de':'tiene como objetivo')+': '+txt,tag:'general',ts:Date.now()});S.s('userMem1',mem);
      }
    }
    const next=COACH_Q.find(q=>!coachProfile()[q.k]);
    renderCoach();
    if(next){
      setTimeout(()=>{coachHist.push({role:'assistant',text:next.q});saveCoach();renderCoach();},400);
    } else {
      // terminó la entrevista: primer mensaje del coach con contexto completo
      coachHist.push({role:'assistant',text:'',streaming:true});saveCoach();renderCoach();
      await coachStream('Acabás de terminar de conocer a la persona. Saludala por su nombre, resumí en una frase cálida lo que entendiste de ella, y proponele UN primer paso muy chiquito y concreto para hoy. Breve y motivador.');
    }
    return;
  }

  // Conversación normal con streaming
  coachHist.push({role:'assistant',text:'',streaming:true});
  saveCoach();renderCoach();
  startThinking(['Pensando','Reflexionando sobre lo que contás','Preparando respuesta']);
  await coachStream(txt);
}

async function coachStream(userMsg){
  const key=aiKey();
  const bubble=document.getElementById('coach-live');
  try{
    const full=await _geminiStream(coachPrompt(userMsg),key,(chunk,acc)=>{
      stopThinking();
      const visible=acc.split('[ACCION')[0];
      if(bubble){bubble.innerHTML=_mdBold(visible)+'<span class="ai-caret">▍</span>';const cont=document.querySelector('#coach-b > div:first-child');if(cont)cont.scrollTop=cont.scrollHeight;}
    });
    let reply=full;
    const actionRegex=/\[ACCION\]([\s\S]*?)\[\/ACCION\]/g;
    let match;const resultados=[];
    while((match=actionRegex.exec(reply))!==null){
      try{resultados.push(ejecutarAccion(JSON.parse(match[1])));}catch(e){resultados.push('Error: '+e.message);}
    }
    if(resultados.length){reply=reply.replace(/\[ACCION\][\s\S]*?\[\/ACCION\]/g,'').trim();if(reply)reply+='\n\n';reply+='✅ '+resultados.join(' · ');}
    coachHist[coachHist.length-1]={role:'assistant',text:reply||'(sin respuesta)'};
    saveCoach();
    if(resultados.length){gastos=S.g('gst4',[]);events=S.g('evts1',[]);}
    if(_voiceSent){_voiceSent=false;const clean=reply.replace(/[✅•⚠️📅📊💪🔴🟢🌱]/g,'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\n/g,' ').trim();speak(clean.slice(0,300));}
  }catch(e){
    stopThinking();
    _voiceSent=false;tst('⚠️ Error: '+e.message,4000);coachHist.pop();saveCoach();
  }
  stopThinking();
  renderCoach();
}

function startVoiceCoach(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){tst('🎤 Usá Chrome o Edge',3000);return;}
  const btn=document.getElementById('coach-mic-btn');
  const rec=new SR();rec.lang='es-UY';rec.interimResults=true;rec.continuous=false;
  if(btn)btn.classList.add('recording');
  const stop=()=>{if(btn)btn.classList.remove('recording');};
  rec.onresult=e=>{const r=e.results[e.results.length-1];if(r.isFinal){const inp=document.getElementById('coach-inp');if(inp){inp.value=r[0].transcript;_voiceSent=true;sendCoach();}stop();}};
  rec.onerror=()=>stop();rec.onend=()=>stop();
  try{rec.start();}catch(e){stop();tst('🎤 Error: '+e.message,3000);}
}

async function generarResumenSesion(sesion, modo){
  if(!sesion||!sesion.mensajes||sesion.mensajes.length<4) return;
  const last=sesion.mensajes[sesion.mensajes.length-1];
  if(last&&last.streaming) return;
  const lastLen=sesion._lastResumenLen||0;
  if(lastLen>0&&sesion.mensajes.length-lastLen<6) return;
  const ctx=sesion.mensajes.filter(m=>!m.streaming).slice(-20).map(m=>'['+m.role+']: '+(m.text||'')).join('\n');
  const label=modo==='coach'?'coaching personal':'asistente personal';
  try{
    const raw=await _aiComplete('Resumí esta conversación de '+label+' en español uruguayo. Devolvé SOLO JSON sin formato: {"titulo":"máximo 5 palabras","resumen":"1-2 frases en tercera persona"}.\n\nConversación:\n'+ctx);
    const j=JSON.parse(_extractJSON(raw)||'{}');
    if(j.titulo&&j.resumen){sesion.titulo=j.titulo.trim();sesion.resumen=j.resumen.trim();sesion.tituloAuto=true;}
  }catch(e){/*silent*/}
  sesion._lastResumenLen=sesion.mensajes.length;
  if(modo==='coach')S.s('coachSessions',coachSessions);else S.s('chatSessions',chatSessions);
}

//  ELIMINAR CON CONFIRMACIÓN (la IA propone, el usuario confirma)
// ════════════════════════════════════════════
// Busca el/los elementos que coinciden con la descripción y arma la confirmación.
function solicitarEliminacion(acc){
  const tipo=(acc.tipo||acc.que||'').toLowerCase();
  const q=(acc.desc||acc.nombre||acc.texto||acc.item||'').toLowerCase().trim();
  let encontrados=[];   // [{label, borrar:fn}]
  const _match=s=>q&&String(s||'').toLowerCase().includes(q);

  if(/gasto/.test(tipo)){
    const gs=S.g('gst4',[]);
    gs.forEach(g=>{if(_match(g.desc)||_match((cats.find(c=>c.id===g.c)||{}).n)){const cn=(cats.find(c=>c.id===g.c)||{}).n||g.c;encontrados.push({label:'Gasto: $'+fmt(g.v)+' '+(g.desc||cn)+' ('+g.f+')',borrar:()=>{const a=S.g('gst4',[]).filter(x=>x._id!==g._id);S.s('gst4',a);gastos=a;}});}});
  } else if(/rutina/.test(tipo)){
    routines.forEach(r=>{if(_match(r.name)){encontrados.push({label:'Rutina: '+r.name,borrar:()=>{routines=routines.filter(x=>x.id!==r.id);if(activeRid===r.id)activeRid=routines[0]?.id||null;S.s('rt2',routines);S.s('arid',activeRid);}});}});
  } else if(/evento|agenda|turno|cita/.test(tipo)){
    const evs=S.g('evts1',[]);
    evs.forEach(e=>{if(_match(e.title)){encontrados.push({label:'Evento: '+e.title+' ('+e.date+')',borrar:()=>{const a=S.g('evts1',[]).filter(x=>x.id!==e.id);S.s('evts1',a);events=a;}});}});
  } else if(/super|compra|lista/.test(tipo)){
    shopList.forEach(it=>{if(_match(it.t)){encontrados.push({label:'Súper: '+it.t,borrar:()=>{shopList=shopList.filter(x=>x.id!==it.id);S.s('shop1',shopList);}});}});
  } else if(/cardio/.test(tipo)){
    cardioLog.forEach(c=>{const lbl=(CARDIO_TYPES[c.type]||{}).label||c.type;if(_match(lbl)){encontrados.push({label:'Cardio: '+lbl+' '+c.mins+'min',borrar:()=>{cardioLog=cardioLog.filter(x=>x.ts!==c.ts);S.s('cardio1',cardioLog);}});}});
  } else if(/comida/.test(tipo)){
    const today=todayStr();const log=(nutData.foodLog||{})[today]||[];
    log.forEach((f,i)=>{if(_match(f.name)){encontrados.push({label:'Comida: '+f.name+' ('+f.cal+'kcal)',borrar:()=>{nutData.foodLog[today]=(nutData.foodLog[today]||[]).filter((_,j)=>j!==i);S.s('nutData',nutData);}});}});
  } else if(/categor/.test(tipo)){
    cats.forEach((c,i)=>{if(_match(c.n)&&!c.cardRef){encontrados.push({label:'Categoría: '+c.n,borrar:()=>{cats=cats.filter(x=>x.id!==c.id);S.s('cats4',cats);}});}});
  } else if(/memoria|recuerdo/.test(tipo)){
    const mem=S.g('userMem1',[]);mem.forEach(x=>{if(_match(x.t)){encontrados.push({label:'Memoria: '+x.t,borrar:()=>{const a=S.g('userMem1',[]).filter(y=>y.ts!==x.ts);S.s('userMem1',a);}});}});
  }

  if(!encontrados.length)return '⚠️ No encontré nada que coincida con "'+(q||tipo)+'" para eliminar';
  // Guardar pendiente y mostrar confirmación
  window._delPend=encontrados;
  setTimeout(()=>mostrarConfirmEliminar(),120);
  return '⏳ Esperando tu confirmación para eliminar '+encontrados.length+' elemento'+(encontrados.length>1?'s':'');
}
function mostrarConfirmEliminar(){
  const items=window._delPend||[];
  if(!items.length)return;
  let h=`<div class="mt" style="color:var(--red)">🗑 Confirmar eliminación</div>
    <div style="font-size:13px;color:var(--text1);margin-bottom:14px">Vas a eliminar ${items.length} elemento${items.length>1?'s':''}. Esto no se puede deshacer:</div>
    <div style="max-height:300px;overflow-y:auto;margin-bottom:18px">`;
  items.forEach(it=>{h+=`<div style="padding:9px 12px;background:var(--bg2);border:1px solid var(--red-b);border-radius:var(--r-sm);margin-bottom:6px;font-size:12px">${esc(it.label)}</div>`;});
  h+=`</div>
    <div style="display:flex;gap:8px">
      <button class="btn b-lg b-g" style="flex:1" onclick="cOv1();window._delPend=null;tst('Cancelado, no se borró nada')">Cancelar</button>
      <button class="btn b-lg" style="flex:1;background:var(--red);color:#fff" onclick="confirmarEliminar()">Sí, eliminar</button>
    </div>`;
  oOv1(h);
}
function confirmarEliminar(){
  const items=window._delPend||[];
  let n=0;
  items.forEach(it=>{try{it.borrar();n++;}catch(e){}});
  window._delPend=null;
  cOv1();
  // refrescar la pantalla activa
  if(typeof renderGastos==='function')renderGastos();
  if(typeof renderGym==='function')renderGym();
  if(typeof renderAgenda==='function')renderAgenda();
  tst('🗑 '+n+' elemento'+(n!==1?'s':'')+' eliminado'+(n!==1?'s':''));
}
function ejecutarAccion(acc){
  if(!acc||!acc.op)return 'Acción inválida';
  if(acc.op==='eliminar'||acc.op==='borrar'){
    // No borra directo: encola y pide confirmación al usuario
    return solicitarEliminacion(acc);
  }
  if(acc.op==='gasto'){
    const cat=cats.find(c=>c.id===acc.cat);
    if(!cat)return 'Categoría "'+acc.cat+'" no encontrada';
    const gastos=S.g('gst4',[]);
    const maxId=gastos.reduce((mx,g)=>Math.max(mx,g._id||0),0);
    const now=new Date();
    const m=acc.m!==undefined?acc.m:now.getMonth();
    const y=acc.y!==undefined?acc.y:now.getFullYear();
    const f=acc.f||(String(now.getDate())+'/'+String(now.getMonth()+1));
    gastos.push({_id:maxId+1,c:acc.cat,v:parseMoney(acc.v),desc:acc.desc||'',m,y,f});
    S.s('gst4',gastos);
    return '$'+fmt((acc.v||0))+' agregado a "'+cat.n+'" ('+f+')';
  }
  if(acc.op==='pago'){
    const cat=cats.find(c=>c.id===acc.cat);
    if(!cat)return 'Categoría "'+acc.cat+'" no encontrada';
    const pe=S.g('pe4',{});
    const now=new Date();
    const m=acc.m!==undefined?acc.m:now.getMonth();
    const y=acc.y!==undefined?acc.y:now.getFullYear();
    pe[acc.cat+'_'+m+'_'+y]=true;
    S.s('pe4',pe);
    return cat.n+' marcado como pagado';
  }
  if(acc.op==='fijo'){
    const cat=cats.find(c=>c.id===acc.cat);
    if(!cat)return 'Categoría "'+acc.cat+'" no encontrada';
    const pf=S.g('pf4',{});
    const now=new Date();
    const m=acc.m!==undefined?acc.m:now.getMonth();
    const y=acc.y!==undefined?acc.y:now.getFullYear();
    pf[acc.cat+'_'+m+'_'+y]=parseMoney(acc.v);
    S.s('pf4',pf);pagosFijos=pf;
    return cat.n+' actualizado a $'+fmt(parseMoney(acc.v));
  }
  if(acc.op==='ahorro'){
    const cat=cats.find(c=>c.id===acc.cat&&c.ahorro)||cats.find(c=>c.ahorro);
    if(!cat)return 'No hay ninguna meta de ahorro. Creá una primero.';
    const pf=S.g('pf4',{});
    const now=new Date();
    const m=acc.m!==undefined?acc.m:now.getMonth();
    const y=acc.y!==undefined?acc.y:now.getFullYear();
    const key=cat.id+'_'+m+'_'+y;
    pf[key]=money((pf[key]||0)+parseMoney(acc.v));
    S.s('pf4',pf);pagosFijos=pf;
    return '🐷 $'+fmt(parseMoney(acc.v))+' guardado en "'+cat.n+'". Llevás $'+fmt(ahorroAcumCat(cat.id));
  }
  if(acc.op==='crear_meta'){
    const nombre=acc.nombre||acc.name||'Meta de ahorro';
    const nueva={id:uid(),n:nombre,c:'#A78BFA',base:parseMoney(acc.aporte),objetivo:parseMoney(acc.objetivo),ahorro:true};
    cats.push(nueva);S.s('cats4',cats);
    return '🎯 Meta "'+nombre+'" creada'+(nueva.objetivo>0?' (objetivo $'+fmt(nueva.objetivo)+')':'');
  }
  if(acc.op==='crear_rutina'){
    if(!acc.name||!acc.days||!acc.days.length)return 'Faltan datos para crear la rutina';
    const rid=uid();
    const days=acc.days.map(d=>({id:uid(),label:d.label,exercises:(d.exercises||[]).map(e=>({name:e.name,muscle:e.muscle,series:e.series||3,reps:e.reps||'10'}))}));
    const r={id:rid,name:acc.name,days,createdAt:Date.now()};
    const rs=S.g('rt2',[]);
    rs.push(r);
    S.s('rt2',rs);
    routines=rs;
    activeRid=rid;
    S.s('arid',rid);
    return 'Rutina "'+acc.name+'" creada con '+days.length+' días y '+(days.reduce((s,d)=>s+d.exercises.length,0))+' ejercicios';
  }
  if(acc.op==='compra'){
    const cards=(S.g('cards1',[])||[]);
    const card=cards.find(c=>c.id===acc.cardId)||cards.find(c=>c.n.toLowerCase()===((acc.n||'').toLowerCase()))||cards.find(c=>cats.some(cat=>cat.cardRef===c.id&&cat.id===acc.cat));
    if(!card)return 'Tarjeta no encontrada. IDs disponibles: '+cards.map(c=>c.id+'('+c.n+')').join(', ');
    const cpurch=S.g('cpurch1',[])||[];
    const now=new Date();
    const v=parseMoney(acc.v);
    const installments=acc.cuotas||1;
    const _paid=(acc.pagadas||0);
    let _sm=now.getMonth()-_paid,_sy=now.getFullYear();_sy+=Math.floor(_sm/12);_sm=((_sm%12)+12)%12;
    cpurch.push({id:uid(),cardId:card.id,commerce:acc.desc||'Gasto',total:v,instAmt:(installments>0?money(v/installments):money(v)),installments,paidInstallments:_paid,category:'otro',date:now.toISOString().slice(0,10),startM:_sm,startY:_sy,addedM:now.getMonth(),addedY:now.getFullYear()});
    S.s('cpurch1',cpurch);
    // ensure card category exists
    ensureCardCats();
    cats=S.g('cats4',[]);
    return '$'+fmt(v)+' agregado a tarjeta '+card.n+(installments>1?' en '+installments+' cuotas':'');
  }
  if(acc.op==='evento'){
    const title=acc.titulo||acc.title||'Evento';
    const date=acc.fecha||acc.date||new Date().toISOString().slice(0,10);
    const time=acc.hora||acc.time||'20:00';
    const reminder=acc.recordatorio||acc.reminder||15;
    events.push({id:uid(),title,date,time,reminder,notified:false});
    sortEvents();S.s('evts1',events);
    if(reminder>0)scheduleNotif(events[events.length-1]);
    return 'Evento "'+title+'" agendado para el '+fmtDateFull(date)+' a las '+time;
  }
  if(acc.op==='responder'){
    return acc.texto||acc.text||'';
  }
  if(acc.op==='comprar'||acc.op==='super'){
    const t=(acc.item||acc.producto||acc.t||'').trim();
    if(!t)return 'No entendí qué agregar a la lista';
    const SC=['verduleria','carniceria','almacen','lacteos','limpieza','bebidas','otro'];
    let cat=(acc.cat||acc.categoria||'otro').toLowerCase();
    if(!SC.includes(cat))cat='otro';
    shopList.push({id:uid(),t,cat,done:false,ts:Date.now()});
    S.s('shop1',shopList);
    return '🛒 "'+t+'" agregado a la lista del súper';
  }
  if(acc.op==='sueno'||acc.op==='sueño'||acc.op==='dormir'){
    const h=parseFloat(acc.horas||acc.hours||acc.h)||0;
    if(h<=0||h>24)return 'Necesito las horas dormidas';
    let q=(acc.calidad||acc.quality||'buena').toLowerCase();
    if(!['mala','regular','buena','excelente'].includes(q))q='buena';
    const today=todayStr();
    if(!nutData.sleepLog)nutData.sleepLog={};
    nutData.sleepLog[today]={hours:h,quality:q,wakeups:parseInt(acc.despertares||acc.wakeups,10)||0,note:acc.nota||acc.note||'',ts:Date.now()};
    S.s('nutData',nutData);
    return '🌙 '+h+'h de sueño registradas ('+q+')';
  }
  if(acc.op==='cardio'){
    let type=(acc.tipo||acc.type||'caminar').toLowerCase();
    // mapear sinónimos comunes
    if(/cinta|treadmill/.test(type)&&/corr|run/.test(type))type='correr_cinta';
    else if(/cinta|treadmill/.test(type))type='caminar_cinta';
    else if(/bici.*fij|fij|spinning|est[aá]tic/.test(type))type='bici_fija';
    const t=CARDIO_TYPES[type]?type:'otro';
    const mins=parseInt(acc.min||acc.mins||acc.minutos,10)||0;
    const km=parseFloat(acc.km||acc.distancia)||0;
    const incline=parseFloat(acc.incline||acc.inclinacion)||0;
    if(mins<=0)return 'Necesito la duración del cardio en minutos';
    let cal=parseInt(acc.cal||acc.calorias,10)||0;
    if(!cal)cal=cardioCalories(t,mins,incline);
    const now=new Date();
    cardioLog.unshift({ts:now.getTime(),date:now.toISOString().slice(0,10),type:t,mins,km,cal,incline});
    if(cardioLog.length>200)cardioLog=cardioLog.slice(0,200);
    S.s('cardio1',cardioLog);
    const meta=CARDIO_TYPES[t];
    return meta.emoji+' '+meta.label+' '+mins+' min'+(km?' ('+km+' km)':'')+' · '+cal+' kcal';
  }
  if(acc.op==='comida'){
    const name=acc.nombre||acc.name||acc.comida||'Comida';
    const cal=parseInt(acc.cal||acc.calorias,10)||0;
    const prot=parseInt(acc.prot||acc.proteinas,10)||0;
    const today=todayStr();
    if(!nutData.foodLog)nutData.foodLog={};
    if(!nutData.foodLog[today])nutData.foodLog[today]=[];
    nutData.foodLog[today].push({name,cal,prot,t:Date.now()});
    S.s('nutData',nutData);
    return '🍽️ "'+name+'" registrada ('+cal+' kcal)';
  }
  if(acc.op==='crear_dieta'){
    const meals=acc.comidas||acc.meals||[];
    if(!meals.length)return 'Sin comidas en el plan';
    let html='';let tc=0,tp=0;
    meals.forEach(m=>{
      tc+=m.calorias||0;tp+=m.proteinas||0;
      const icon=m.momento.includes('Desayuno')?'🌅':m.momento.includes('Mañana')?'🍎':m.momento.includes('Almuerzo')?'🍗':m.momento.includes('Merienda')?'🍵':m.momento.includes('Cena')?'🌙':'';
      html+=`<div class="crd" style="margin-bottom:8px">
        <div style="font-weight:700;font-size:13px">${icon} ${esc(m.momento)}</div>
        <div style="font-size:12px;color:var(--text1);margin-top:5px">${esc(m.comida||'')}</div>
      </div>`;
    });
    html+=`<div class="card" style="border-color:var(--green-b);margin-top:4px">
      <div style="font-weight:700;font-size:14px">📊 ${tc}cal · ${tp}g prot</div>
    </div>`;
    nutData.mealPlans=nutData.mealPlans||[];
    nutData.mealPlans.push({date:todayStr(),html,plan:{plan:meals,totalCalorias:tc,totalProteinas:tp}});
    nutData.lastPlanDate=todayStr();
    S.s('nutData',nutData);
    return 'Plan de comidas generado con '+meals.length+' comidas ('+tc+'cal, '+tp+'g proteína)';
  }
  if(acc.op==='recordar'){
    const dato=(acc.dato||acc.text||'').trim();
    if(!dato)return 'Nada para recordar';
    const mem=S.g('userMem1',[]);
    const _norm=s=>String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
    const nd=_norm(dato);
    // Dedup: exacto o muy parecido (una frase contiene a la otra)
    const dup=mem.find(x=>{const nx=_norm(x.t);return nx===nd||nx.includes(nd)||nd.includes(nx);});
    if(dup){
      // si el dato nuevo es más largo/completo, lo reemplaza
      if(nd.length>_norm(dup.t).length){dup.t=dato;dup.ts=Date.now();if(acc.tag)dup.tag=acc.tag;S.s('userMem1',mem);return '🧠 Actualicé: '+dato;}
      return '🧠 Ya lo tenía anotado';
    }
    // ¿es un dato importante (permanente)? la IA puede marcarlo, o se detecta por palabras clave
    const _impWords=/celíac|celiac|alergi|intoleran|diabet|hipertens|vegetarian|vegan|lesión|lesion|crónic|cronic|medicament|objetivo|meta|trabaj|estudia|hijo|hija|cónyuge|conyuge|pareja|cumpleaños|cumpleanos/;
    const importante=acc.importante===true||_impWords.test(nd);
    mem.push({t:dato,tag:acc.tag||'general',ts:Date.now(),imp:importante});
    // Tope 80: si se pasa, descartar primero los NO importantes más viejos
    if(mem.length>80){
      const sobra=mem.length-80;
      const noImp=mem.map((x,i)=>({x,i})).filter(o=>!o.x.imp).sort((a,b)=>(a.x.ts||0)-(b.x.ts||0));
      const aBorrar=new Set(noImp.slice(0,sobra).map(o=>o.i));
      let filtrado=mem.filter((_,i)=>!aBorrar.has(i));
      if(filtrado.length>80)filtrado=filtrado.slice(filtrado.length-80); // por si todo era importante
      S.s('userMem1',filtrado);
    } else S.s('userMem1',mem);
    return '🧠 Anotado'+(importante?' (importante)':'')+': '+dato;
  }
  if(acc.op==='olvidar'){
    const q=(acc.dato||acc.text||'').toLowerCase().trim();
    if(!q)return 'Nada para olvidar';
    let mem=S.g('userMem1',[]);
    const before=mem.length;
    mem=mem.filter(x=>!x.t.toLowerCase().includes(q));
    S.s('userMem1',mem);
    return before>mem.length?'🧠 Listo, lo olvidé':'No encontré eso en mi memoria';
  }
  return 'Operación "'+acc.op+'" no soportada';
}

async function _fetchT(url,opts,ms){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),ms||35000);
  try{return await fetch(url,Object.assign({},opts,{signal:ctrl.signal}));}
  finally{clearTimeout(t);}
}

// Llamada NO-streaming. Devuelve el texto o lanza {status,message}.
async function _aiComplete(prompt){
  const prov=aiProvider(), key=aiKey(), model=aiModel();
  if(!key)throw {status:0,message:'Falta la API key de '+AI_PROVIDERS[prov].label};
  if(prov==='free'){
    const r=await _fetchT(FREE_AI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:model||FREE_AI_MODEL,messages:[{role:'user',content:prompt}]})},45000);
    if(!r.ok)throw {status:r.status,message:(await r.text().catch(()=>'')).slice(0,160)};
    const ct=(r.headers.get('content-type')||'');
    if(ct.indexOf('application/json')>=0){const d=await r.json();return d?.choices?.[0]?.message?.content||d?.choices?.[0]?.text||'';}
    return (await r.text())||'';
  }
  if(prov==='gemini'){
    const r=await _fetchT('https://generativelanguage.googleapis.com/v1beta/models/'+model+':generateContent',
      {method:'POST',headers:{'Content-Type':'application/json','X-goog-api-key':key},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    if(!r.ok)throw {status:r.status,message:(await r.text().catch(()=>'')).slice(0,160)};
    const d=await r.json();
    return d?.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }
  if(prov==='openai'||prov==='grok'){
    const _url=prov==='grok'?'https://api.x.ai/v1/chat/completions':'https://api.openai.com/v1/chat/completions';
    const r=await _fetchT(_url,
      {method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'user',content:prompt}]})});
    if(!r.ok)throw {status:r.status,message:(await r.text().catch(()=>'')).slice(0,160)};
    const d=await r.json();
    return d?.choices?.[0]?.message?.content||'';
  }
  if(prov==='anthropic'){
    const r=await _fetchT('https://api.anthropic.com/v1/messages',
      {method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model,max_tokens:2048,messages:[{role:'user',content:prompt}]})});
    if(!r.ok)throw {status:r.status,message:(await r.text().catch(()=>'')).slice(0,160)};
    const d=await r.json();
    return (d?.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||'';
  }
  throw {status:0,message:'Proveedor desconocido'};
}

const GEMINI_MODEL='gemini-flash-latest';
async function _gemini(prompt,_key,reintento=0){
  try{
    const text=await _aiComplete(prompt);
    return {ok:true,status:200,json:async()=>({candidates:[{content:{parts:[{text}]}}]}),text:async()=>text};
  }catch(e){
    if(reintento<2){await new Promise(r=>setTimeout(r,1500));return _gemini(prompt,_key,reintento+1);}
    const msg=e&&e.message?e.message:String(e);
    return {ok:false,status:(e&&e.status)||0,json:async()=>({error:{message:msg}}),text:async()=>msg};
  }
}

// Streaming SSE multi-proveedor: llama onChunk(textoNuevo, acumulado) por cada fragmento.
async function _geminiStream(prompt,_key,onChunk,reintento=0){
  const prov=aiProvider(), key=aiKey(), model=aiModel();
  if(!key)throw new Error('Falta la API key de '+AI_PROVIDERS[prov].label);
  if(prov==='free'){
    try{
      const full=await _aiComplete(prompt);
      if(onChunk&&full)onChunk(full,full);
      return full;
    }catch(e){throw new Error((e&&e.message)||'Error IA gratis');}
  }
  let url,headers,body,parse;
  if(prov==='gemini'){
    url='https://generativelanguage.googleapis.com/v1beta/models/'+model+':streamGenerateContent?alt=sse';
    headers={'Content-Type':'application/json','X-goog-api-key':key};
    body={contents:[{parts:[{text:prompt}]}]};
    parse=j=>j?.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }else if(prov==='openai'||prov==='grok'){
    url=prov==='grok'?'https://api.x.ai/v1/chat/completions':'https://api.openai.com/v1/chat/completions';
    headers={'Content-Type':'application/json','Authorization':'Bearer '+key};
    body={model,stream:true,messages:[{role:'user',content:prompt}]};
    parse=j=>j?.choices?.[0]?.delta?.content||'';
  }else{ // anthropic
    url='https://api.anthropic.com/v1/messages';
    headers={'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
    body={model,max_tokens:2048,stream:true,messages:[{role:'user',content:prompt}]};
    parse=j=>(j?.type==='content_block_delta'&&j?.delta?.text)?j.delta.text:'';
  }
  try{
    const res=await _fetchT(url,{method:'POST',headers,body:JSON.stringify(body)},90000);
    if(!res.ok){
      if(reintento<2){await new Promise(r=>setTimeout(r,1500));return _geminiStream(prompt,_key,onChunk,reintento+1);}
      const err=await res.text().catch(()=>'');
      throw new Error('HTTP '+res.status+' '+err.slice(0,140));
    }
    const reader=res.body.getReader();
    const dec=new TextDecoder();
    let buf='',full='';
    while(true){
      const {value,done}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();
      for(const line of lines){
        const l=line.trim();
        if(!l.startsWith('data:'))continue;
        const payload=l.slice(5).trim();
        if(!payload||payload==='[DONE]')continue;
        try{
          const j=JSON.parse(payload);
          const t=parse(j);
          if(t){full+=t;onChunk(t,full);}
        }catch(_){}
      }
    }
    return full;
  }catch(e){
    if(reintento<2&&e.name!=='AbortError'){await new Promise(r=>setTimeout(r,1500));return _geminiStream(prompt,_key,onChunk,reintento+1);}
    throw e;
  }
}

// Extrae el primer objeto JSON COMPLETO de un texto (maneja anidación y ```fences```).
function _extractJSON(text){
  if(!text)return null;
  const t=text.replace(/```json/gi,'').replace(/```/g,'');
  const start=t.indexOf('{');
  if(start<0)return null;
  let depth=0,inStr=false,escq=false;
  for(let i=start;i<t.length;i++){
    const ch=t[i];
    if(inStr){
      if(escq)escq=false;
      else if(ch==='\\')escq=true;
      else if(ch==='"')inStr=false;
    }else{
      if(ch==='"')inStr=true;
      else if(ch==='{')depth++;
      else if(ch==='}'){depth--;if(depth===0)return t.slice(start,i+1);}
    }
  }
  return null;
}

function speak(txt,cb){
  if(!('speechSynthesis' in window)){if(cb)cb();return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='es-UY';
  u.rate=1.05;
  u.pitch=1;
  // Prefer Spanish voice if available
  const voices=window.speechSynthesis.getVoices();
  const esVoice=voices.find(v=>v.lang.startsWith('es')&&v.lang.includes('419'))||voices.find(v=>v.lang.startsWith('es'));
  if(esVoice)u.voice=esVoice;
  u.onend=()=>{if(cb)cb();};
  u.onerror=()=>{if(cb)cb();};
  window.speechSynthesis.speak(u);
}

`+data.slice(0,50000);

async function analyzeExpenseFile(file,isPdf){
  const gkey=(S.g('gemini_key','')||'').trim();
  if(!gkey){tst('⚠️ El análisis de fotos/PDF usa Gemini. Pegá una API key de Gemini en Config → IA.',5500);return;}
  if(file.size>15*1024*1024){tst('⚠️ Archivo muy grande (máx 15 MB)',4000);return;}

  chatHist.push({role:'user',text:`${isPdf?'📑':'🖼️'} ${esc(file.name)}`});
  chatHist.push({role:'assistant',text:'🔎 Leyendo el archivo y detectando gastos…'});
  saveChat();renderChat();

  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const now=new Date();
    const catList=cats.map(c=>'{id:"'+c.id+'",n:"'+c.n+'"}').join(',');
    const prompt='Sos un asistente de finanzas. En la imagen/PDF hay un reporte, recibo o estado de gastos. '+
      'Extraé CADA gasto y devolvé SOLO un objeto JSON válido (sin texto extra ni bloques ```), con esta estructura exacta:\n'+
      '{"cats":[{"id":"cat_x","n":"Nombre","c":"#hex","base":0}],"gastos":[{"_id":1,"c":"cat_x","v":0,"desc":"comercio o detalle","m":'+now.getMonth()+',"y":'+now.getFullYear()+',"f":"d/m"}]}\n'+
      'REGLAS:\n'+
      '- Categorías EXISTENTES (reusá su id y nombre EXACTOS si el gasto encaja): ['+catList+'].\n'+
      '- En "cats" incluí TODAS las categorías que uses en "gastos": las existentes (con su id y nombre tal cual) y las nuevas (id tipo "cat_nueva1", nombre claro, color hex variado).\n'+
      '- "v" es un número sin símbolos ni separador de miles (12500, no "12.500" ni "$12.500").\n'+
      '- "_id" secuencial 1,2,3… "m" es 0-11 (Enero=0). "f"="d/m"; si el gasto no tiene fecha, usá hoy '+now.getDate()+'/'+(now.getMonth()+1)+'.\n'+
      '- Si no se detecta ningún gasto: {"error":"motivo breve"}.';

    const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent',
      {method:'POST',headers:{'Content-Type':'application/json','X-goog-api-key':gkey},
       body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:file.type||(isPdf?'application/pdf':'image/jpeg'),data:b64}}]}]})});
    if(!resp.ok){const e=await resp.text().catch(()=>'');throw new Error('Gemini '+resp.status+': '+e.slice(0,110));}
    const data=await resp.json();
    const text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const jsonStr=_extractJSON(text);
    if(!jsonStr)throw new Error('No pude leer gastos del archivo. Probá con una imagen más clara o mejor encuadrada.');
    const obj=JSON.parse(jsonStr);
    if(obj.error){chatHist[chatHist.length-1]={role:'assistant',text:'ℹ️ '+esc(obj.error)};saveChat();renderChat();return;}

    const list=obj.gastos||[];
    if(!list.length)throw new Error('No se detectaron gastos en el archivo.');
    const total=list.reduce((s,g)=>s+(+g.v||0),0);
    const nNew=(obj.cats||[]).filter(c=>!cats.some(x=>x.id===c.id||x.n.toLowerCase()===(c.n||'').toLowerCase())).length;

    // estructura que espera confirmExcelImport (merge + creación de categorías)
    obj.pagosFijos=obj.pagosFijos||{};
    obj.pagosEstado=obj.pagosEstado||{};
    _pendingImport=obj;

    chatHist[chatHist.length-1]={role:'assistant',text:`🧾 **${list.length} gasto${list.length!==1?'s':''} detectado${list.length!==1?'s':''}** · total ${fmtFull(total)}`+(nNew?`\nSe crearán ${nNew} categoría${nNew!==1?'s':''} nueva${nNew!==1?'s':''}.`:'')+`\n\nRevisá y confirmá abajo para cargarlos en el programa.`};
    saveChat();
    renderChat(); // renderChat dibuja el botón "📥 Importar datos" porque _pendingImport quedó seteado
  }catch(e){
    chatHist[chatHist.length-1]={role:'assistant',text:'⚠️ '+esc(e.message)};
    saveChat();renderChat();
  }
}

function confirmExcelImport(){
  const obj=_pendingImport;
  if(!obj){tst('No hay datos pendientes');return;}
  try{
    // merge categories
    const existingCats=S.g('cats4',[]);
    const catMap={}; // oldId -> newId
    const newCats=[];
    (obj.cats||[]).forEach((c,i)=>{
      const existing=existingCats.find(x=>x.n.toLowerCase()===c.n.toLowerCase());
      if(existing){
        catMap[c.id]=existing.id;
      } else {
        const newId='cat_'+Date.now().toString(36)+i;
        catMap[c.id]=newId;
        newCats.push({id:newId,n:c.n,c:c.c,base:parseMoney(c.base)});
      }
    });
    if(newCats.length)existingCats.push(...newCats);
    S.s('cats4',existingCats);
    // merge pagosFijos (remap ids)
    const pf=S.g('pagosFijos4',{});
    Object.entries(obj.pagosFijos||{}).forEach(([k,v])=>{
      const parts=k.split('_');
      const oldId=parts.slice(0,-2).join('_');
      const newId=catMap[oldId]||oldId;
      const m=parts[parts.length-2];
      const y=parts[parts.length-1];
      const nk=newId+'_'+m+'_'+y;
      if(pf[nk]===undefined)pf[nk]=parseMoney(v);
    });
    S.s('pagosFijos4',pf);
    // merge pagosEstado
    const pe=S.g('pagosEstado4',{});
    Object.entries(obj.pagosEstado||{}).forEach(([k,v])=>{
      const parts=k.split('_');
      const oldId=parts.slice(0,-2).join('_');
      const newId=catMap[oldId]||oldId;
      const m=parts[parts.length-2];

async function hashPass(p){
  try{
    if(!crypto||!crypto.subtle)throw new Error('crypto.subtle not available');
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(p+'__gst4s__'));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){
    // Fallback to legacy btoa hash if crypto.subtle is unavailable (file:// protocol, etc)
    return hashPassLegacy(p);
  }
}
function hashPassLegacy(p){return btoa(unescape(encodeURIComponent(p+'__gst4s__')));}

let _voiceRec=null,_voiceActive=false;

function _showInterim(t){

    el.id='voice-interim';
    document.body.appendChild(el);
  }

function _hideInterim(){
  const el=document.getElementById('voice-interim');
  if(el)el.classList.remove('on');
}

async function startVoice(){
  if(_voiceActive){_stopVoice();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){tst('🎤 Usá Chrome o Edge para voz',4000);return;}
  const btn=document.getElementById('mic-btn');
  _voiceRec=new SR();
  _voiceRec.lang='es-UY';
  _voiceRec.interimResults=true;
  _voiceRec.maxAlternatives=1;
  _voiceRec.continuous=false;
  _voiceActive=true;
  btn.classList.add('recording');
  btn.textContent='⏹';
  _showInterim('Escuchando…');
  let finalTxt='';
  _voiceRec.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const r=e.results[i];
      if(r.isFinal)finalTxt+=r[0].transcript;
      else interim+=r[0].transcript;
    }
    _showInterim(((finalTxt+' '+interim).trim())||'Escuchando…');
  };
  _voiceRec.onerror=e=>{
    if(e.error==='not-allowed')tst('🎤 Permití el micrófono en el navegador',4000);
    else if(e.error==='no-speech')tst('🎤 No te escuché, probá de nuevo',3000);
    else if(e.error!=='aborted')tst('🎤 Error: '+e.error,3000);
  };
  _voiceRec.onend=()=>{
    _hideInterim();
    if(btn){btn.classList.remove('recording');btn.textContent='🎤';}
    const txt=finalTxt.trim();
    _voiceActive=false;_voiceRec=null;
    if(txt){
      if(curPage==='chat')chatVoiceInput(txt);
      else interpretVoice(txt);
    }
  };
  try{_voiceRec.start();}catch(e){_stopVoice();tst('🎤 Error al iniciar: '+e.message,3000);}
}

function _stopVoice(){
  _voiceActive=false;
  _hideInterim();
  const btn=document.getElementById('mic-btn');
  if(btn){btn.classList.remove('recording');btn.textContent='🎤';}
  try{_voiceRec&&_voiceRec.stop();}catch(_){}
  _voiceRec=null;
}

async function doLogin(){
  let name=(document.getElementById('login-user')?.value||'').trim();
  let pass=document.getElementById('login-pass')?.value||'';
  if(!name||!pass){showLoginScreen('Completá usuario y contraseña');return;}
  // Try both lowercase and original case
  const users=getUsers();
  let user;
  for(const tryName of [name.toLowerCase(),name]){
    const newHash=await hashPass(pass);
    user=users.find(u=>u.name.toLowerCase()===tryName.toLowerCase()&&u.passHash===newHash);
    if(user)break;
    // Fallback: hash viejo (btoa)
    const legacy=hashPassLegacy(pass);
    user=users.find(u=>u.name.toLowerCase()===tryName.toLowerCase()&&u.passHash===legacy);
    if(user){user.passHash=newHash;saveUsers(users);break;}
  }
  if(!user){
    // One more try: generate both hashes and compare all users
    const newHash=await hashPass(pass);
    const legacy=hashPassLegacy(pass);
    for(const u of users){
      if(u.passHash===newHash||u.passHash===legacy){
        u.passHash=newHash;saveUsers(users);
        user=u;break;
      }
    }
  }
  if(!user){showLoginScreen('Usuario o contraseña incorrectos');return;}
  currentUser={id:user.id,name:user.name,isAdmin:user.isAdmin};
  localStorage.setItem(AUTH_SESSION,JSON.stringify({id:user.id}));
  onLoginSuccess();
}

function migrateOldData(){

  const oldKeys=['rt2','arid','sets2','wts2','ghst2','gst4','pf4','pe4','sld4','cats4','seed_v'+SEED_VERSION];
  if(oldKeys.some(k=>localStorage.getItem(k)!==null)){
    oldKeys.forEach(k=>{const v=localStorage.getItem(k);if(v!==null){localStorage.setItem(currentUser.id+'_'+k,v);localStorage.removeItem(k);}});
    // Marcar seed como distribuido para que usuarios nuevos no lo reciban
    localStorage.setItem('gst4_seed_dist_v'+SEED_VERSION,'1');
  }
  localStorage.setItem(DONE,'1');
}

  if(!S.g('seed_v'+SEED_VERSION)){
    const ep=S.g('pf4',{});const ee=S.g('pe4',{});
    S.s('pf4',{...SEED_PF,...ep});S.s('pe4',{...SEED_PE,...ee});

// MÓDULO TARJETAS DE CRÉDITO
// ══════════════════════════════════════════
const PURCH_CATS=['nafta','supermercado','farmacia','restaurante','ropa','electrónica','servicios','entretenimiento','otro'];
const CARD_TYPES=['Visa','Mastercard','OCA','BROU','Otra'];
const CARD_COLORS=['#3B7FFF','#FF3B4E','#00C48C','#FFB347','#A855F7','#22D3EE','#F97316','#84CC16'];

// ── Helpers ──
function getCardPurchs(cardId){return cpurch.filter(p=>p.cardId===cardId);}
// instAmt = monto de la CUOTA tal como figura en el estado de cuenta (NO se divide).
// Compras viejas sin instAmt: fallback al cálculo anterior (total/installments).
function pInstAmt(p){return p.instAmt!=null?money(p.instAmt):(p.installments>0?money(p.total/p.installments):money(p.total));}
function pRemaining(p){return Math.max(0,(p.installments||1)-(p.paidInstallments||0));}
function pStartM(p){return p.startM!=null?p.startM:(p.addedM!=null?p.addedM:new Date().getMonth());}
function pStartY(p){return p.startY!=null?p.startY:(p.addedY!=null?p.addedY:new Date().getFullYear());}
// Mes/año en que cae la cuota kk (1-based) de una compra
function instMonthYear(p,kk){let mm=pStartM(p)+(kk-1),yy=pStartY(p);yy+=Math.floor(mm/12);mm=((mm%12)+12)%12;return {m:mm,y:yy};}
function getCardDebt(cardId){return sumMoney(getCardPurchs(cardId),p=>pInstAmt(p)*pRemaining(p));}
// Suma de cuotas que VENCEN en (m,y). Cuenta también la última cuota (X==N). Sin m,y => mes actual.
function getCardMonthAmt(cardId,m,y){
  if(m==null||y==null){const n=new Date();m=n.getMonth();y=n.getFullYear();}
  let t=0;
  getCardPurchs(cardId).forEach(p=>{
    const N=p.installments||1;
    for(let kk=1;kk<=N;kk++){const im=instMonthYear(p,kk);if(im.m===m&&im.y===y){t=money(t+pInstAmt(p));break;}}
  });
  return t;
}
// Items (compra + nº de cuota) que vencen en (m,y), para el desglose por mes
function getCardItemsForMonth(cardId,m,y){
  const r=[];
  getCardPurchs(cardId).forEach(p=>{
    const N=p.installments||1;
    for(let kk=1;kk<=N;kk++){const im=instMonthYear(p,kk);if(im.m===m&&im.y===y){r.push({p,cuota:kk,N});break;}}
  });
  return r;
}

    const debt=getCardDebt(card.id);
    const mes=getCardMonthAmt(card.id);
    const purchs=getCardPurchs(card.id);
    const active=purchs.filter(p=>pRemaining(p)>0).length;
    totDeuda+=debt;totMes+=mes;
    h+=`<div class="card" style="margin-bottom:10px;border-color:${card.color}44;cursor:pointer" onclick="openCardDetail('${card.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:52px;height:34px;border-radius:8px;background:${card.color};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;letter-spacing:.5px;flex-shrink:0">${esc(card.type)}</div>
          <div>
            <div style="font-family:var(--fd);font-size:16px;font-weight:800">${esc(card.name)}</div>
            <div style="font-size:10px;color:var(--text2);margin-top:2px">${active} compra${active!==1?'s':''} activa${active!==1?'s':''}</div>
          </div>
        </div>
        <button onclick="event.stopPropagation();delCard('${card.id}')" style="color:var(--text3);font-size:16px;padding:4px 6px">🗑</button>
      </div>
      <div class="stats s2">
        <div class="st"><div class="sv" style="color:var(--red);font-size:15px">${fmt(debt)}</div><div class="sl">Deuda total</div></div>
        <div class="st"><div class="sv" style="color:${card.color};font-size:15px">${fmt(mes)}</div><div class="sl">Cuota del mes</div></div>
      </div>
    </div>`;
  });

  if(cards.length>1){
    h+=`<div class="card" style="margin-top:4px;background:var(--bg1);border-color:var(--border2)">
      <div style="font-size:9px;color:var(--text2);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:10px">Total todas las tarjetas</div>
      <div class="stats s2">
        <div class="st"><div class="sv" style="color:var(--red)">${fmt(totDeuda)}</div><div class="sl">Deuda total</div></div>
        <div class="st"><div class="sv">${fmt(totMes)}</div><div class="sl">Cuota del mes</div></div>
      </div>
    </div>`;
  }
  return h+'</div>';
}

// ── DETALLE DE TARJETA ──
function openCardDetail(cardId,vm,vy){
  const card=cards.find(c=>c.id===cardId);if(!card)return;
  const purchs=getCardPurchs(cardId);
  const debt=getCardDebt(cardId);
  const hasMonth=(vm!=null&&vy!=null);
  const _cardCatObj=cats.find(c=>c.cardRef===cardId);
  const mes=hasMonth?(_cardCatObj?montoCat(_cardCatObj,vm,vy):getCardMonthAmt(cardId,vm,vy)):getCardMonthAmt(cardId);
  const gemKey=S.g('gemini_key','');

  // Cabecera
  let h=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px">
    <div style="width:60px;height:38px;border-radius:10px;background:${card.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0">${esc(card.type)}</div>
    <div style="font-family:var(--fd);font-size:20px;font-weight:800">${esc(card.name)}</div>
  </div>
  <div class="stats s2" style="margin-bottom:18px">
    <div class="st"><div class="sv" style="color:var(--red)">${fmtFull(debt)}</div><div class="sl">Deuda total</div></div>
    <div class="st"><div class="sv" style="color:${card.color}">${fmtFull(mes)}</div><div class="sl">${hasMonth?'Pagaste en '+MONTHS[vm]:'Cuota este mes'}</div></div>
  </div>`;

  // ── Desglose del mes seleccionado (todo marcado como pagado) ──
  if(hasMonth){
    const items=getCardItemsForMonth(cardId,vm,vy);
    h+=`<div class="sec-t">💳 ${MONTHS[vm]} ${vy} · qué pagaste</div>`;
    if(!items.length){
      if(mes>0){
        h+=`<div style="display:flex;justify-content:space-between;align-items:baseline;padding:14px;background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:14px">
          <div style="font-size:12px;color:var(--text2);font-weight:700">Total pagado en ${MONTHS[vm]}</div>
          <div style="font-family:var(--fm);font-size:18px;font-weight:800;color:${card.color}">${fmtFull(mes)}</div>
        </div>
        <div style="font-size:11px;color:var(--text3);margin:-6px 2px 14px">Sin desglose. Cargá el PDF con ✨ IA para ver cada compra.</div>`;
      } else {
        h+=`<div style="text-align:center;padding:22px 0;color:var(--text2);font-size:12px">No hay compras cargadas en este resumen.<br><span style="font-size:11px;color:var(--text3)">Usá ✨ IA para cargar el estado de cuenta de ${MONTHS[vm]}.</span></div>`;
      }
    } else {
      let _itemsSum=0;
      items.forEach(({p,cuota,N})=>{
        _itemsSum=money(_itemsSum+pInstAmt(p));
        h+=`<div style="background:var(--bg1);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:700">${esc(p.commerce)}</div>
              <div style="font-size:10px;color:var(--text2);margin-top:3px">${p.category||'otro'} · cuota ${cuota}/${N} · <span style="color:var(--green)">✓ pagado</span></div>
            </div>
            <div style="font-family:var(--fm);font-size:14px;font-weight:700;flex-shrink:0;margin-left:12px">${fmtFull(pInstAmt(p))}</div>
          </div>
        </div>`;
      });
      const _otros=money(mes-_itemsSum);
      if(_otros>2){
        h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--bg2);border:1px dashed var(--border2);border-radius:var(--r-sm);margin-bottom:8px">
          <div style="font-size:12px;color:var(--text2)">Otros cargos (intereses, anualidad…)</div>
          <div style="font-family:var(--fm);font-size:13px;font-weight:700;color:var(--text1)">${fmtFull(_otros)}</div>
        </div>`;
      }
      h+=`<div style="display:flex;justify-content:space-between;align-items:baseline;padding:10px 4px 2px;border-top:1px solid var(--border);margin-bottom:14px">
        <div style="font-size:12px;color:var(--text2);font-weight:700">Total pagado en ${MONTHS[vm]}</div>
        <div style="font-family:var(--fm);font-size:16px;font-weight:800;color:${card.color}">${fmtFull(mes)}</div>
      </div>`;
    }
    h+=`<div class="sec-t" style="margin-top:6px">Todas las compras de la tarjeta</div>`;
  }

  // Desglose por categoría (solo cuotas activas)
  const catTotals={};
  PURCH_CATS.forEach(c=>{catTotals[c]=0;});
  purchs.filter(p=>pRemaining(p)>0).forEach(p=>{
    const cat=p.category||'otro';
    catTotals[cat]=(catTotals[cat]||0)+pInstAmt(p);
  });
  const catActivas=PURCH_CATS.filter(c=>catTotals[c]>0);
  if(catActivas.length>1){
    h+=`<div class="sec-t">Por categoría · cuota mensual</div>
    <div class="stats s2" style="margin-bottom:18px">`;
    catActivas.forEach(c=>{
      h+=`<div class="st"><div class="sv" style="font-size:13px">${fmt(catTotals[c])}</div><div class="sl">${c}</div></div>`;
    });
    h+=`</div>`;
  }

  // Barra de acciones
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="sec-t" style="margin:0">Compras (${purchs.length})</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
      ${gemKey?`<button class="btn b-xs" style="background:linear-gradient(135deg,#4285F4,#7C3AED);color:#fff;border:none" onclick="openAIAnalysis('${cardId}')">✨ IA</button>`:''}
      <button class="btn b-xs b-p" onclick="openAddPurch('${cardId}')">+ Compra</button>
    </div>
  </div>`;

  if(!purchs.length){
    h+=`<div style="text-align:center;padding:28px 0;color:var(--text2);font-size:12px">Sin compras registradas</div>`;
  } else {
    // Activas primero, luego pagadas
    const activas=purchs.filter(p=>pRemaining(p)>0);
    const pagadas=purchs.filter(p=>pRemaining(p)===0);
    [...activas,...pagadas].forEach(p=>{
      const rem=pRemaining(p);
      const amt=pInstAmt(p);
      const done=rem===0;
      const pct=p.installments>0?Math.round((p.paidInstallments/p.installments)*100):100;
      h+=`<div style="background:${done?'var(--bg1)':'var(--bg2)'};border:1px solid ${done?'var(--border)':'var(--border2)'};border-radius:var(--r-sm);padding:13px;margin-bottom:8px;${done?'opacity:.5':''}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;${done?'text-decoration:line-through;color:var(--text2)':''}">${esc(p.commerce)}</div>
            <div style="font-size:10px;color:var(--text2);margin-top:3px">${p.category||'otro'} · ${p.date||''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:12px">
            <div style="font-family:var(--fm);font-size:14px;font-weight:700;color:${done?'var(--text2)':'var(--text0)'}">${fmtFull(Math.round(amt))}</div>
            <div style="font-size:10px;color:var(--text2)">por cuota</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1"><div class="pbar"><div class="pfill" style="width:${pct}%;background:${done?'var(--green)':card.color}"></div></div></div>
          <div style="font-size:10px;color:var(--text2);font-family:var(--fm);white-space:nowrap;flex-shrink:0">${p.paidInstallments}/${p.installments}</div>
          ${!done?`<button class="btn b-xs b-grn" onclick="markInstPaid('${p.id}')" style="flex-shrink:0">✓ Pagar</button>`:''}
          <button onclick="delPurch('${p.id}')" style="color:var(--text3);font-size:13px;padding:2px 5px;flex-shrink:0">✕</button>
        </div>
      </div>`;
    });
  }
  oOv1(h);
}

function delCard(id){
  const c=cards.find(x=>x.id===id);

  S.s('cards1',cards);S.s('cpurch1',cpurch);S.s('cats4',cats);

}

  oOv2(`<div class="mt">Nueva compra</div>
  <input type="hidden" id="pu-cardid" value="${cardId}">
  <div class="fld"><label>Comercio</label><input class="inp" id="pu-com" placeholder="Supermercado, Netflix, YPF…"></div>

  <div class="inp-r">
    <div class="fld"><label>Cuotas totales</label><input class="inp" id="pu-inst" type="number" value="1" min="1" inputmode="numeric"></div>
    <div class="fld"><label>Ya pagadas</label><input class="inp" id="pu-paid" type="number" value="0" min="0" inputmode="numeric"></div>
  </div>
  <div class="fld"><label>Categoría</label><select class="inp" id="pu-cat">${PURCH_CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
  <div class="fld" style="margin-bottom:20px"><label>Fecha</label><input class="inp" id="pu-date" value="${f}"></div>
  <button class="btn b-lg b-p" onclick="doSavePurch()">Guardar compra</button>`);
}
function doSavePurch(){
  const cardId=document.getElementById('pu-cardid')?.value;
  const commerce=(document.getElementById('pu-com')?.value||'').trim();
  const total=parseMoney(document.getElementById('pu-total')?.value);
  const installments=Math.max(1,parseInt(document.getElementById('pu-inst')?.value)||1);
  const paidInstallments=Math.min(installments,Math.max(0,parseInt(document.getElementById('pu-paid')?.value)||0));
  const category=document.getElementById('pu-cat')?.value||'otro';
  const date=(document.getElementById('pu-date')?.value||'').trim();
  if(!commerce){tst('Escribí el nombre del comercio');return;}
  if(!total){tst('Ingresá el monto total');return;}
  const now=new Date();
  let sm=now.getMonth()-paidInstallments,sy=now.getFullYear();
  sy+=Math.floor(sm/12);sm=((sm%12)+12)%12;
  cpurch.push({id:uid(),cardId,commerce,total,installments,paidInstallments,category,date,startM:sm,startY:sy,addedM:now.getMonth(),addedY:now.getFullYear()});
  S.s('cpurch1',cpurch);
  cOv2();tst(`✓ ${commerce} guardado`);
  openCardDetail(cardId);
}
function delPurch(id){
  const p=cpurch.find(x=>x.id===id);if(!p)return;
  if(!confirm(`¿Eliminar "${p.commerce}"?`))return;
  cpurch=cpurch.filter(x=>x.id!==id);
  S.s('cpurch1',cpurch);
  tst('Compra eliminada');
  openCardDetail(p.cardId);
}
function markInstPaid(id){
  const p=cpurch.find(x=>x.id===id);
  if(!p||p.paidInstallments>=p.installments)return;
  p.paidInstallments++;
  S.s('cpurch1',cpurch);
  tst(`✓ Cuota ${p.paidInstallments}/${p.installments} pagada`);
  openCardDetail(p.cardId);
}

function openAIAnalysis(cardId){
  const now=new Date();
  const _mOpts=MONTHS.map((nm,i)=>`<option value="${i}"${i===now.getMonth()?' selected':''}>${nm}</option>`).join('');
  const _yNow=now.getFullYear();
  const _yOpts=[_yNow,_yNow-1,_yNow-2].map(yy=>`<option value="${yy}"${yy===_yNow?' selected':''}>${yy}</option>`).join('');
  oOv2(`<div class="mt">✨ Analizar con Gemini</div>
  <input type="hidden" id="ai-card-id" value="${cardId}">
  <div style="background:linear-gradient(135deg,rgba(66,133,244,.08),rgba(124,58,237,.08));border:1px solid rgba(124,58,237,.25);border-radius:var(--r-sm);padding:14px;margin-bottom:18px;font-size:12px;color:var(--text1);line-height:1.7">
    Subí una foto o PDF de tu estado de cuenta. Gemini extraerá las compras, cuotas y montos.<br>
    <span style="color:var(--text2);font-size:11px">Elegí el mes del resumen para cargarlo en su lugar. Podés cargar resúmenes viejos.</span>
  </div>
  <div class="inp-r" style="margin-bottom:16px">
    <div class="fld"><label>Mes del resumen</label><select class="inp" id="ai-stmt-m">${_mOpts}</select></div>
    <div class="fld"><label>Año</label><select class="inp" id="ai-stmt-y">${_yOpts}</select></div>
  </div>
  <div class="fld" style="margin-bottom:20px">
    <label>Imagen o PDF del estado de cuenta</label>
    <input id="ai-file" type="file" accept="image/*,application/pdf" class="inp" style="padding:11px;cursor:pointer">
  </div>
  <button class="btn b-lg" style="width:100%;background:linear-gradient(135deg,#4285F4,#7C3AED);color:#fff;border:none;margin-bottom:16px" onclick="runGeminiAnalysis()">✨ Analizar</button>
  <div id="ai-result"></div>`);
}

async function runGeminiAnalysis(){
  const key=S.g('gemini_key','');
  if(!key){tst('Configurá tu API key de Gemini en Config');return;}
  const file=document.getElementById('ai-file')?.files[0];
  if(!file){tst('Seleccioná un archivo primero');return;}

  const btn=document.querySelector('#ai-result')?.previousElementSibling;
  document.getElementById('ai-result').innerHTML=`<div style="text-align:center;padding:24px;color:var(--text2);font-size:13px">⏳ Analizando con Gemini Flash…</div>`;

  try{
    // Leer archivo como base64
    const b64=await new Promise((res,rej)=>{
      const reader=new FileReader();
      reader.onload=e=>res(e.target.result.split(',')[1]);
      reader.onerror=rej;
      reader.readAsDataURL(file);
    });

    const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent',{method:'POST',headers:{'Content-Type':'application/json','X-goog-api-key':key},body:JSON.stringify({contents:[{parts:[
      {text:'Analizá este estado de cuenta de tarjeta de crédito uruguaya. Para CADA compra extraé exactamente estos campos:\n- "comercio": nombre del comercio.\n- "cuota_monto": el MONTO DE LA CUOTA de ESTE resumen en pesos uruguayos. Es el importe que figura al lado de la compra, lo que se paga este mes. NO es el precio total del producto. Devolvé solo el número, sin símbolos ni puntos de miles.\n- "cuotas_totales": cantidad total de cuotas (la N en "X/N").\n- "cuota_actual": el número de cuota de este resumen (la X en "X/N"). IMPORTANTE: si dice 4/4 es la cuota 4 de 4, se paga en ESTE resumen, NO está saldada, contala igual. Nunca pongas 0 ni descartes una compra porque X==N.\n- "categoria": una de exactamente estas: nafta, supermercado, farmacia, restaurante, ropa, electrónica, servicios, entretenimiento, otro.\nAdemás extraé "total_a_pagar": el TOTAL A PAGAR de este resumen (el número final que el cliente debe pagar este mes, en pesos uruguayos, solo el número).\nRespondé SOLO con JSON, sin texto extra ni explicaciones, con esta forma EXACTA:\n{"total_a_pagar":0,"compras":[{"comercio":"","cuota_monto":0,"cuotas_totales":1,"cuota_actual":1,"categoria":"otro"}]}'},
      {inline_data:{mime_type:file.type,data:b64}}
    ]}]})});

    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||`HTTP ${resp.status}`);}
    const data=await resp.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';

    // Parsear: objeto {total_a_pagar, compras:[...]} o, por compatibilidad, un array suelto
    let purchases=[],declaredTotal=0;
    const objMatch=text.match(/\{[\s\S]*\}/);
    const arrMatch=text.match(/\[[\s\S]*\]/);
    if(objMatch){
      const parsed=JSON.parse(objMatch[0]);
      purchases=parsed.compras||parsed.purchases||[];
      declaredTotal=+parsed.total_a_pagar||+parsed.total||0;
    } else if(arrMatch){
      purchases=JSON.parse(arrMatch[0]);
    }
    if(!Array.isArray(purchases)||!purchases.length)throw new Error('No se detectaron compras en el documento. Probá con una imagen más clara.');

    window._aiPurchases=purchases;
    window._aiDeclaredTotal=declaredTotal;
    window._aiCardId=document.getElementById('ai-card-id')?.value;
    window._aiStmtM=parseInt(document.getElementById('ai-stmt-m')?.value);
    window._aiStmtY=parseInt(document.getElementById('ai-stmt-y')?.value);
    renderAIResults(purchases);

  }catch(e){
    document.getElementById('ai-result').innerHTML=`<div class="alert al-dgr"><div class="al-i">⚠️</div><div class="al-t"><strong>Error:</strong> ${esc(e.message)}</div></div>`;
  }
}

function renderAIResults(purchases){
  const stmtM=window._aiStmtM,stmtY=window._aiStmtY;
  const sum=money(purchases.reduce((a,p)=>a+(+p.cuota_monto||+p.monto||0),0));
  const decl=money(window._aiDeclaredTotal||0);
  const diff=money(Math.abs(sum-decl));
  const ok=decl>0&&diff<=2; // tolerancia de $2 por redondeo
  const mesLbl=(stmtM!=null&&!isNaN(stmtM))?`${MONTHS[stmtM]} ${stmtY}`:'';

  let h=`<div class="sec-t" style="margin-top:4px">${purchases.length} compras · resumen de ${esc(mesLbl)}</div>`;

  // Tarjeta de validación: suma de cuotas vs total del PDF
  if(decl>0){
    h+=`<div style="background:${ok?'rgba(34,197,94,.10)':'rgba(239,68,68,.10)'};border:1px solid ${ok?'var(--green)':'var(--red)'}44;border-radius:var(--r-sm);padding:13px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:12px;color:var(--text2)">Suma de las cuotas</span>
        <span style="font-family:var(--fm);font-size:13px;font-weight:700">${fmtFull(sum)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:12px;color:var(--text2)">Total a pagar del PDF</span>
        <span style="font-family:var(--fm);font-size:13px;font-weight:700">${fmtFull(decl)}</span>
      </div>
      <div style="margin-top:8px;font-size:12px;font-weight:700;color:${ok?'var(--green)':'var(--red)'}">
        ${ok?'✓ Coincide exacto con el resumen':'⚠️ No coincide · diferencia '+fmtFull(diff)+'. Revisá los montos antes de guardar.'}
      </div>
    </div>`;
  } else {
    h+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px;margin-bottom:12px;font-size:12px;color:var(--text2)">Suma de las cuotas: <b style="color:var(--text0)">${fmtFull(sum)}</b><br><span style="font-size:11px">No se detectó el "total a pagar" del PDF para comparar.</span></div>`;
  }

  purchases.forEach((p,i)=>{
    const cuotas=p.cuotas_totales||1;
    const actual=p.cuota_actual||1;
    const cuotaMonto=+p.cuota_monto||+p.monto||0;
    h+=`<div class="crd" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
        <div style="flex:1;font-size:13px;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.comercio||'Sin nombre')}</div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px">
          <div style="font-family:var(--fm);font-size:13px;font-weight:700">${fmtFull(cuotaMonto)}</div>
          <div style="font-size:9px;color:var(--text2)">cuota</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <span class="chip" style="background:var(--bg3);color:var(--text2)">cuota ${actual}/${cuotas}</span>
        <span class="chip" style="background:var(--blue-d);color:var(--blue);border:1px solid var(--blue-b)">${p.categoria||'otro'}</span>
      </div>
    </div>`;
  });
  h+=`<button class="btn b-lg b-p" style="margin-top:10px" onclick="confirmAIPurchases()">✓ Confirmar y guardar (${purchases.length})</button>`;
  document.getElementById('ai-result').innerHTML=h;
}

function confirmAIPurchases(){
  const cardId=window._aiCardId;
  const purchases=window._aiPurchases;
  if(!cardId||!purchases?.length)return;
  const now=new Date();
  // Mes/año del resumen elegido por el usuario (si no, mes actual)
  let stmtM=window._aiStmtM,stmtY=window._aiStmtY;
  if(stmtM==null||isNaN(stmtM))stmtM=now.getMonth();
  if(stmtY==null||isNaN(stmtY))stmtY=now.getFullYear();
  const f=`${MONTHS[stmtM]} ${stmtY}`;

  let nuevas=0,actualizadas=0;
  purchases.forEach(p=>{
    const inst=Math.max(1,parseInt(p.cuotas_totales)||1);
    const actual=Math.min(inst,Math.max(1,parseInt(p.cuota_actual)||1));
    const cuotaMonto=money(+p.cuota_monto||+p.monto||0);
    const commerce=p.comercio||'Sin nombre';
    // Mes/año en que cae la 1ª cuota = mes del resumen - (cuota_actual - 1)
    let sm=stmtM-(actual-1),sy=stmtY;
    sy+=Math.floor(sm/12);sm=((sm%12)+12)%12;
    // Dedup: misma compra si coincide comercio (normalizado) + cuotas totales + mes de inicio
    const ex=cpurch.find(x=>x.cardId===cardId&&(x.installments||1)===inst&&x.startM===sm&&x.startY===sy&&normStr(x.commerce)===normStr(commerce));
    if(ex){
      ex.paidInstallments=Math.max(ex.paidInstallments||0,actual); // avanzar, nunca retroceder
      ex.instAmt=cuotaMonto;
      ex.total=money(cuotaMonto*inst);
      if(p.categoria)ex.category=p.categoria;
      actualizadas++;
    } else {
      cpurch.push({id:uid(),cardId,commerce,instAmt:cuotaMonto,total:money(cuotaMonto*inst),installments:inst,paidInstallments:actual,category:p.categoria||'otro',date:f,startM:sm,startY:sy,addedM:now.getMonth(),addedY:now.getFullYear()});
      nuevas++;
    }
  });
  S.s('cpurch1',cpurch);
  // El total del mes de ESTA tarjeta = total a pagar del resumen (lo que figura en el PDF).
  // Se guarda como override del mes para que aparezca exacto en los gastos de ese mes.
  const _cardCat=cats.find(c=>c.cardRef===cardId);
  if(_cardCat){
    const _sumItems=money(purchases.reduce((a,p)=>a+money(+p.cuota_monto||+p.monto||0),0));
    const _decl=money(window._aiDeclaredTotal||0);
    pagosFijos[k(_cardCat.id,stmtM,stmtY)]=_decl>0?_decl:_sumItems;
    S.s('pf4',pagosFijos);
  }
  cOv2();
  tst(`✓ ${nuevas} nueva${nuevas!==1?'s':''}, ${actualizadas} actualizada${actualizadas!==1?'s':''} en ${MONTHS[stmtM]}`);
  renderGastos();
  openCardDetail(cardId,stmtM,stmtY);
}

function exportData(){
  try{
    const data={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      try{data[k]=JSON.parse(localStorage.getItem(k));}catch{data[k]=localStorage.getItem(k);}
    }
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const date=new Date();
    const fname=`app-backup-${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}.json`;
    if(navigator.canShare&&navigator.canShare({files:[new File([blob],fname,{type:'application/json'})]})){
      navigator.share({files:[new File([blob],fname,{type:'application/json'})],title:'App Backup'}).catch(()=>{});
    }else{
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
    }
    tst('✓ Datos exportados');
  }catch(e){tst('Error al exportar: '+e.message);}
}

function importData(ev){
  const file=ev.target.files?.[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!confirm('¿Importar datos? Se reemplazarán los datos actuales. Si ya creaste tu cuenta en Netlify, los datos se restaurarán.'))return;
      let count=0;
      Object.keys(data).forEach(k=>{
        try{localStorage.setItem(k,JSON.stringify(data[k]));count++;}catch{}
      });
      tst(`✓ ${count} datos importados. Recargando...`);
      setTimeout(()=>location.reload(),1200);
    }catch(err){tst('Error al importar: '+err.message);}
  };
  reader.readAsText(file);
  ev.target.value='';
}

function buscarConversaciones(query){
  const q=normStr(query||'');const R=[];
  function add(s,modo){
    if(s.titulo&&q&&normStr(s.titulo).includes(q))R.push({sesionId:s.id,modo,titulo:s.titulo,fecha:s.updatedAt,fragmento:highlightFragment(s.titulo,query,120),msgIndex:null});
    if(s.resumen&&q&&normStr(s.resumen).includes(q))R.push({sesionId:s.id,modo,titulo:s.titulo,fecha:s.updatedAt,fragmento:highlightFragment(s.resumen,query,120),msgIndex:null});
    if(s.mensajes)s.mensajes.forEach((m,i)=>{
      if(m.text&&q&&normStr(m.text).includes(q))R.push({sesionId:s.id,modo,titulo:s.titulo,fecha:s.updatedAt,fragmento:highlightFragment(m.text,query,120),msgIndex:i});
    });
  }
  chatSessions.forEach(s=>add(s,'asistente'));
  coachSessions.forEach(s=>add(s,'coach'));
  if(!q){
    chatSessions.forEach(s=>R.push({sesionId:s.id,modo:'asistente',titulo:s.titulo,fecha:s.updatedAt,fragmento:'',msgIndex:null}));
    coachSessions.forEach(s=>R.push({sesionId:s.id,modo:'coach',titulo:s.titulo,fecha:s.updatedAt,fragmento:'',msgIndex:null}));
  }
  return R.sort((a,b)=>b.fecha-a.fecha);
}
function openBuscador(){
  oOv1(`<div class="mt">🔍 Buscar en conversaciones</div>
    <input class="inp" id="buscar-q" placeholder="Buscá en Chat y Coach…" oninput="mostrarBusqueda()" autofocus>
    <div id="buscar-results" style="max-height:400px;overflow-y:auto;margin-top:10px"></div>`);
  setTimeout(()=>{mostrarBusqueda();document.getElementById('buscar-q')?.focus();},50);
}
function mostrarBusqueda(){
  const q=document.getElementById('buscar-q')?.value||'';
  const R=buscarConversaciones(q);
  const el=document.getElementById('buscar-results');if(!el)return;
  if(!R.length){
    el.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3)">'+(q?'Sin resultados para «'+esc(q)+'»':'Sin conversaciones')+'</div>';return;
  }
  el.innerHTML=R.map(r=>{
    const isCoach=r.modo==='coach';
    const bc=isCoach?'#10B981':'var(--blue)';
    const bg=isCoach?'rgba(16,185,129,0.13)':'rgba(59,130,246,0.13)';
    const bl=isCoach?'Coach':'Asistente';
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 4px;border-bottom:1px solid var(--border);cursor:pointer" onclick="abrirResultado('${r.sesionId}','${r.modo}',${r.msgIndex!==null?r.msgIndex:'null'})">
      <div style="flex-shrink:0;padding:3px 8px;border-radius:6px;background:${bg};color:${bc};font-size:10px;font-weight:700">${bl}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.titulo)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${new Date(r.fecha).toLocaleDateString('es-UY')}</div>
        ${r.fragmento?`<div style="font-size:11px;color:var(--text2);margin-top:4px;line-height:1.5">${r.fragmento}</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function abrirResultado(sesionId,modo,msgIndex){
  cOv1();
  if(modo==='asistente'){page('chat');switchSession(sesionId);}
  else{page('coach');switchCoachSession(sesionId);}
  if(msgIndex!=null){
    setTimeout(()=>{
      const cont=document.getElementById(modo==='asistente'?'cx-msgs':'coach-msgs');
      if(!cont)return;
      const rows=cont.querySelectorAll('.cx-row');
      if(rows[msgIndex]){
        rows[msgIndex].scrollIntoView({behavior:'smooth',block:'center'});
        rows[msgIndex].style.transition='background 0.3s';
        rows[msgIndex].style.background='rgba(59,130,246,0.13)';
        setTimeout(()=>rows[msgIndex].style.background='',1200);
      }
    },200);
  }
}
function openMemoria(){
  const TAG_META={
    dieta:{emoji:'🍎',label:'Dieta',color:'#F97316'},
    gym:{emoji:'💪',label:'Gimnasio',color:'#22C55E'},
    finanzas:{emoji:'💰',label:'Finanzas',color:'#3B82F6'},
    agenda:{emoji:'📅',label:'Agenda',color:'#A855F7'},
    general:{emoji:'📝',label:'General',color:'#6B7280'}
  };
  function renderMem(){
    const mem=S.g('userMem1',[]);
    const sorted=[...mem].sort((a,b)=>b.ts-a.ts);
    const groups={};
    sorted.forEach(x=>{
      const key=x.tag&&TAG_META[x.tag]?x.tag:'general';
      if(!groups[key])groups[key]=[];
      groups[key].push(x);
    });
    let h=`<div class="mt">🧠 Lo que sé de vos</div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">${mem.length} / 80 recuerdos</div>
      <div style="display:flex;gap:6px;margin-bottom:14px">
        <input class="inp" id="mem-inp" placeholder="Ej: No como carne roja" style="flex:1" onkeydown="if(event.key==='Enter')agregarMemoria()">
        <button class="btn b-sm b-p" onclick="agregarMemoria()">➕ Agregar</button>
      </div>
      <div style="max-height:420px;overflow-y:auto">`;
    Object.keys(TAG_META).forEach(tag=>{
      const items=groups[tag];
      if(!items||!items.length)return;
      const m=TAG_META[tag];
      h+=`<div style="margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:${m.color};margin-bottom:4px">${m.emoji} ${m.label}</div>`;
      items.forEach(x=>{
        h+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:6px;background:var(--bg3);margin-bottom:3px${x.imp?';border:1px solid var(--gold-b)':''}">
          <button class="btn b-xs" onclick="toggleImpMem(${x.ts})" title="Marcar importante" style="font-size:12px;flex-shrink:0;padding:2px 4px;color:${x.imp?'var(--gold)':'var(--text3)'}">${x.imp?'★':'☆'}</button>
          <div style="flex:1;font-size:12px;color:var(--text1);line-height:1.5">${esc(x.t)}</div>
          <button class="btn b-xs b-g" onclick="eliminarMemoria(${x.ts})" style="font-size:10px;color:var(--red);flex-shrink:0">🗑</button>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>
      <div style="margin-top:12px"><button class="btn b-sm b-g" onclick="if(confirm('¿Borrar TODA la memoria?')){S.s('userMem1',[]);renderMem()}" style="color:var(--red)">🗑 Borrar toda la memoria</button></div>`;
    document.getElementById('m1').innerHTML=h;
    setTimeout(()=>document.getElementById('mem-inp')?.focus(),50);
  }
  oOv1('');renderMem();
  window.agregarMemoria=function(){
    const inp=document.getElementById('mem-inp');
    const txt=inp?.value.trim();
    if(!txt)return;
    const mem=S.g('userMem1',[]);
    if(mem.length>=80){tst('🧠 Máximo 80 recuerdos. Borrá algunos primero.');return;}
    mem.push({t:txt,tag:'general',ts:Date.now()});
    S.s('userMem1',mem);
    inp.value='';renderMem();tst('✓ Anotado');
  };
  window.eliminarMemoria=function(ts){
    const mem=S.g('userMem1',[]);
    const idx=mem.findIndex(x=>x.ts===ts);
    if(idx>=0)mem.splice(idx,1);
    S.s('userMem1',mem);
    renderMem();
  };
  window.toggleImpMem=function(ts){
    const mem=S.g('userMem1',[]);
    const it=mem.find(x=>x.ts===ts);
    if(it){it.imp=!it.imp;S.s('userMem1',mem);renderMem();}
  };
}
