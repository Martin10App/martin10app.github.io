<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A0B11">
<title>MARTIN · APP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:radial-gradient(130% 70% at 50% -15%,rgba(110,91,255,.10),transparent 55%),#0A0B11;color:#F4F5FA;font-family:'Inter',sans-serif;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:#2a2d38;border-radius:2px}
button{cursor:pointer;border:none;background:none;color:inherit}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

:root{
  --bg0:#0A0B11;--bg1:#11131C;--bg2:#171A26;--bg3:#1F2433;--bg4:#2A3042;
  --border:#ffffff0d;--border2:#ffffff17;--border3:#ffffff28;
  --text0:#F4F5FA;--text1:#AFB2C4;--text2:#71748A;--text3:#454960;
  --accent:#6E5BFF;--accent2:#8E7BFF;--accent-d:rgba(110,91,255,.13);--accent-b:rgba(110,91,255,.34);
  --red:#FF4D5E;--red-d:rgba(255,77,94,.12);--red-b:rgba(255,77,94,.26);
  --green:#10D29B;--green-d:rgba(16,210,155,.1);--green-b:rgba(16,210,155,.28);
  --blue:#4D8DFF;--blue-d:rgba(77,141,255,.1);--blue-b:rgba(77,141,255,.26);
  --gold:#FFC062;--gold-d:rgba(255,192,98,.1);--gold-b:rgba(255,192,98,.28);
  --purple:#A855F7;--cyan:#22D3EE;--lime:#84CC16;--rose:#FB7185;--teal:#14B8A6;--orange:#F97316;
  --r:18px;--r-sm:13px;--r-xs:8px;
  --fd:'Syne',sans-serif;--fm:'JetBrains Mono',monospace;
  --shadow-sm:0 1px 2px rgba(0,0,0,.32);
  --shadow:0 8px 24px -8px rgba(0,0,0,.55);
  --shadow-lg:0 22px 56px -14px rgba(0,0,0,.65);
  --glow:0 0 28px -6px var(--accent-b);
}

#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
#scr{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior-y:contain;-webkit-overflow-scrolling:touch}
#nav{flex-shrink:0;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(10,11,17,.86);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-top:1px solid var(--border2);box-shadow:0 -10px 40px -12px rgba(0,0,0,.7);padding:10px 0 max(10px,env(safe-area-inset-bottom));z-index:100;position:relative}
#nav::before{content:"";position:absolute;top:0;left:18%;right:18%;height:1px;background:linear-gradient(90deg,transparent,var(--accent-b),transparent)}
.nb{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text2);font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:6px 6px;transition:color .2s,transform .2s;font-family:var(--fd)}
.nb svg{width:24px;height:24px;stroke-width:1.8;transition:all .2s}
.nb:active{transform:scale(.9)}
.nb.on{color:var(--accent2)}.nb.on svg{filter:drop-shadow(0 0 10px var(--accent-b))}

.pg{display:none;min-height:100%;padding-bottom:24px}
.pg.on{display:block;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.ph{position:sticky;top:0;z-index:50;background:rgba(10,11,17,.82);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-bottom:1px solid var(--border);padding:18px 20px 0}
.ph-r{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.ph-t{font-family:var(--fd);font-size:23px;font-weight:800;letter-spacing:-.6px;line-height:1.05}
.ph-s{font-size:10px;color:var(--text2);letter-spacing:2.5px;font-weight:600;margin-top:3px;text-transform:uppercase}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;margin:0 -20px;padding:0 20px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;color:var(--text2);font-size:12px;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;font-family:var(--fd);white-space:nowrap}
.tab.on{color:var(--text0);border-color:var(--accent)}
.tab-line{border-bottom:1px solid var(--border)}

.sec{padding:18px 20px}
.sec+.sec{padding-top:0}
.sec-t{font-size:9px;color:var(--text2);letter-spacing:2.5px;font-weight:700;text-transform:uppercase;margin-bottom:12px}

.card{background:linear-gradient(180deg,#191c29,var(--bg2));border:1px solid var(--border2);border-radius:var(--r);padding:16px;position:relative;box-shadow:var(--shadow);overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent)}
.card+.card,.card+.crd,.crd+.card,.crd+.crd{margin-top:9px}
.crd{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:13px;box-shadow:var(--shadow-sm)}

.stats{display:grid;gap:9px}
.s2{grid-template-columns:1fr 1fr}.s3{grid-template-columns:1fr 1fr 1fr}.s4{grid-template-columns:repeat(4,1fr)}
.st{background:linear-gradient(180deg,#191c29,var(--bg2));border:1px solid var(--border2);border-radius:var(--r-sm);padding:14px 10px;text-align:center;min-width:0;box-shadow:var(--shadow-sm)}
.sv{font-family:var(--fm);font-size:18px;font-weight:700;line-height:1;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sl{font-size:9px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;line-height:1.3}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:var(--r-sm);font-size:13px;font-weight:600;transition:all .18s;white-space:nowrap}
.b-lg{padding:14px 22px;border-radius:var(--r);font-size:14px;font-weight:700;width:100%}
.b-md{padding:10px 16px}
.b-sm{padding:7px 12px;font-size:12px;border-radius:var(--r-xs)}
.b-xs{padding:5px 10px;font-size:11px;border-radius:7px}
.b-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 18px -6px var(--accent-b)}
.b-p:active{background:linear-gradient(135deg,#5a48e8,#7a66f5)}
.b-g{background:var(--bg3);border:1px solid var(--border2);color:var(--text1)}
.b-g:active{background:var(--bg4)}
.b-grn{background:var(--green-d);border:1px solid var(--green-b);color:var(--green)}
.b-blu{background:var(--blue-d);border:1px solid var(--blue-b);color:var(--blue)}
.b-red{background:var(--red-d);border:1px solid var(--red-b);color:var(--red)}
.btn:active{transform:scale(.97)}

.paid-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:9px;font-size:11px;font-weight:700;letter-spacing:.3px;transition:all .2s}
.paid-btn.no{background:var(--bg3);border:1px solid var(--border2);color:var(--text2)}
.paid-btn.yes{background:var(--green-d);border:1px solid var(--green-b);color:var(--green)}

.fld{margin-bottom:14px}
.fld label{display:block;font-size:10px;color:var(--text2);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:7px}
.inp{width:100%;padding:12px 14px;border-radius:var(--r-sm);background:var(--bg3);border:1px solid var(--border2);color:var(--text0);font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--accent-b);box-shadow:0 0 0 3px var(--accent-d)}
.inp::placeholder{color:var(--text3)}
.inp option{background:#1a1c28}
.inp-r{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.amt-inp{background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;color:var(--text0);font-size:13px;font-weight:700;font-family:var(--fm);text-align:right;outline:none;padding:6px 8px;width:88px;transition:all .2s}
.amt-inp:focus{border-color:var(--blue);background:var(--bg4)}
.amt-inp.edited{border-color:var(--gold);background:var(--gold-d)}

.pbar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.chip{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

.sets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.sb{width:40px;height:40px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(255,255,255,.3);font-size:13px;font-weight:700;transition:all .18s;font-family:var(--fm)}
.sb.ck{font-size:16px}.sb:active{transform:scale(.92)}

.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);align-items:flex-end;justify-content:center}
.ov.on{display:flex;animation:fi .2s}
.mdl{background:var(--bg1);border:1px solid var(--border2);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:20px 20px max(20px,env(safe-area-inset-bottom));animation:su .25s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg)}
@keyframes su{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
.mh{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 20px}
.mt{font-family:var(--fd);font-size:18px;font-weight:800;margin-bottom:20px}

#tst{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(20,22,32,.97);border:1px solid var(--border3);color:var(--text0);padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#tst.on{opacity:1;transform:translateX(-50%) translateY(0)}

.ring-w{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-l{position:absolute;font-family:var(--fm);font-size:9px;font-weight:700;color:var(--text0)}

.api-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;font-size:10px;font-weight:700;letter-spacing:.5px}
.api-ok{background:var(--green-d);border:1px solid var(--green-b);color:var(--green)}
.api-loading{background:var(--gold-d);border:1px solid var(--gold-b);color:var(--gold)}
.api-err{background:var(--red-d);border:1px solid var(--red-b);color:var(--red)}

.cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}

.bar-c{display:flex;align-items:flex-end;gap:3px;height:100px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1);min-height:2px;cursor:pointer}
.bar-l{font-size:9px;color:var(--text2);font-weight:600;text-align:center;line-height:1}

.exp{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.exp:last-child{border-bottom:none}

.pres-row{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;transition:all .2s}
.pres-row.paid{border-color:var(--green-b);background:rgba(0,196,140,.05)}

.empty{text-align:center;padding:44px 20px}
.empty-i{font-size:38px;margin-bottom:12px}
.empty-t{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:5px}
.empty-s{font-size:12px;color:var(--text2);line-height:1.6}

.alert{border-radius:var(--r-sm);padding:13px 15px;display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.al-i{font-size:18px;flex-shrink:0}
.al-t{font-size:13px;line-height:1.6}
.al-warn{background:var(--gold-d);border:1px solid var(--gold-b);color:var(--gold)}
.al-info{background:var(--blue-d);border:1px solid var(--blue-b);color:var(--blue)}
.al-suc{background:var(--green-d);border:1px solid var(--green-b);color:var(--green)}
.al-dgr{background:var(--red-d);border:1px solid var(--red-b);color:var(--red)}

.div{height:1px;background:var(--border);margin:16px 0}

.mnav{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px;margin-bottom:16px}
.mnav-b{color:var(--text1);font-size:22px;line-height:1;padding:2px 10px;border-radius:8px;transition:background .2s}
.mnav-b:active{background:var(--bg3)}
.mnav-l{flex:1;text-align:center;font-family:var(--fd);font-size:14px;font-weight:800;line-height:1.2}

.sueldo-card{background:linear-gradient(135deg,rgba(59,127,255,.08),rgba(59,127,255,.02));border:1px solid var(--blue-b);border-radius:var(--r);padding:16px;margin-bottom:14px}
.sueldo-inp{background:var(--bg1);border:1.5px solid var(--blue-b);border-radius:10px;color:var(--text0);font-family:var(--fm);font-size:22px;font-weight:700;text-align:right;padding:8px 12px;width:100%;outline:none;transition:all .2s}
.sueldo-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-d)}

.delta{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm);font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px}
.delta-up{color:var(--red);background:var(--red-d)}
.delta-dn{color:var(--green);background:var(--green-d)}
.delta-eq{color:var(--text2);background:var(--bg3)}

/* hero card for big numbers */
.hero{background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.hero-bg{position:absolute;top:-20%;right:-10%;width:200px;height:200px;border-radius:50%;filter:blur(60px);opacity:.15}
.hero-l{font-size:10px;color:var(--text2);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:8px;position:relative}
.hero-v{font-family:var(--fd);font-size:28px;font-weight:800;line-height:1;position:relative}
.hero-s{font-size:11px;color:var(--text2);margin-top:6px;position:relative}

/* year compare table */
.yr-tbl{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.yr-tbl-row{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);align-items:center;font-size:12px}
.yr-tbl-row:last-child{border-bottom:none}
.yr-tbl-row.header{background:var(--bg3);font-size:9px;color:var(--text2);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.yr-tbl-row.total{background:var(--bg3);font-weight:700;border-top:1px solid var(--border2)}
.yr-num{font-family:var(--fm);font-weight:700;text-align:right}

/* tag */
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.tag-now{background:var(--red);color:#fff}
.tag-hist{background:var(--bg3);color:var(--text2)}

/* ── LOGIN ── */
#login-screen{display:flex;position:fixed;inset:0;z-index:9999;background:var(--bg0);flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto}
.login-card{width:100%;max-width:360px}
.login-logo{text-align:center;margin-bottom:36px}
.login-logo-t{font-family:var(--fd);font-size:30px;font-weight:800;letter-spacing:-.5px}
.login-logo-s{font-size:10px;color:var(--text2);letter-spacing:3px;font-weight:600;text-transform:uppercase;margin-top:6px}
.login-box{background:var(--bg1);border:1px solid var(--border2);border-radius:22px;padding:26px}
.login-err{background:var(--red-d);border:1px solid var(--red-b);border-radius:9px;padding:11px 14px;font-size:12px;color:var(--red);margin-bottom:16px;text-align:center;display:none}
.login-first-t{font-family:var(--fd);font-size:17px;font-weight:800;margin-bottom:5px}
.login-first-s{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:14px;flex-shrink:0;border:none;cursor:pointer;transition:opacity .2s}
.user-avatar:active{opacity:.75}

/* ── MICRÓFONO VOZ ── */
#mic-btn{position:fixed;bottom:74px;right:16px;width:54px;height:54px;border-radius:50%;background:var(--red);color:#fff;font-size:22px;z-index:150;box-shadow:0 4px 22px rgba(255,59,78,.45);display:none;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .18s}
#mic-btn:active{transform:scale(.9)}
#mic-btn.recording{animation:mic-pulse 1.2s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 4px 22px rgba(255,59,78,.45);transform:scale(1)}50%{box-shadow:0 0 0 10px rgba(255,59,78,.15),0 4px 22px rgba(255,59,78,.6);transform:scale(1.08)}}
#voice-interim{position:fixed;left:50%;bottom:140px;transform:translateX(-50%) translateY(10px);max-width:84%;background:rgba(20,22,32,.97);border:1px solid var(--border3);color:var(--text0);padding:12px 18px;border-radius:14px;font-size:14px;font-weight:500;line-height:1.4;text-align:center;z-index:998;opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#voice-interim.on{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:.8}}
.typing-dots{display:inline-flex;align-items:center;gap:8px;align-self:flex-start;padding:11px 15px;background:var(--bg3);border:1px solid var(--border2);border-radius:16px 16px 16px 4px;margin-top:4px;box-shadow:var(--shadow-sm)}
.typing-dots .tk-txt{font-size:12.5px;font-weight:600;background:linear-gradient(90deg,var(--text2) 30%,var(--text0) 50%,var(--text2) 70%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:tkShimmer 1.8s linear infinite}
@keyframes tkShimmer{0%{background-position:140% 0}100%{background-position:-40% 0}}
.typing-dots .tk-d{display:inline-flex;gap:4px}
.typing-dots span.dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:dotPulse 1.4s ease-in-out infinite}
.typing-dots span.dot:nth-child(2){animation-delay:.2s}
.typing-dots span.dot:nth-child(3){animation-delay:.4s}
.ai-caret{display:inline-block;width:7px;animation:caretBlink .9s steps(1) infinite;color:var(--text2)}
@keyframes caretBlink{50%{opacity:0}}
.cx-msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 14px;display:flex;flex-direction:column;gap:13px;-webkit-overflow-scrolling:touch}
.cx-row{display:flex;gap:9px;max-width:88%}
.cx-row.u{align-self:flex-end;flex-direction:row-reverse}
.cx-row.a{align-self:flex-start}
.cx-av{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;margin-top:2px}
.cx-av svg{width:17px;height:17px}
.cx-bub{padding:11px 14px;font-size:13.5px;line-height:1.55;border-radius:16px;word-break:break-word;white-space:pre-wrap;min-width:0}
.cx-row.a .cx-bub{background:var(--bg3);color:var(--text0);border-bottom-left-radius:5px}
.cx-row.u .cx-bub{background:var(--red);color:#fff;border-bottom-right-radius:5px}
.cx-bub.res{background:var(--green-d);border:1px solid var(--green-b);color:var(--text0)}
.cx-bub b{font-weight:700}
.cx-vc{display:inline-flex;align-items:center;gap:6px}
.cx-vc svg{width:14px;height:14px;opacity:.85;flex-shrink:0}
.cx-empty{text-align:center;padding:40px 20px;color:var(--text2);margin:auto 0}

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-t">MARTIN<span style="color:var(--accent2)">·</span>APP</div>
      <div class="login-logo-s">Acceso privado</div>
    </div>

    <!-- Formulario de login (usuarios ya existentes) -->
    <div id="login-form">
      <div class="login-box">
        <div class="login-err" id="login-err"></div>
        <div class="fld">
          <label>Usuario</label>
          <input id="login-user" class="inp" type="text" placeholder="tu usuario" autocomplete="username" autocapitalize="none" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
        </div>
        <div class="fld" style="margin-bottom:20px">
          <label>Contraseña</label>
          <input id="login-pass" class="inp" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn b-lg b-p" onclick="doLogin()">Entrar</button>
        <div style="text-align:center;margin-top:16px">
          <span style="font-size:12px;color:var(--text2)">¿No tenés cuenta?</span>
          <button onclick="showCreateAccountForm()" style="font-size:12px;color:var(--blue);font-weight:600;background:none;border:none;cursor:pointer;padding:4px">Crear una</button>
        </div>
        <div style="text-align:center;margin-top:8px">
          <button onclick="showRecoverAccess()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:4px;text-decoration:underline">🔑 Recuperar acceso</button>
        </div>
      </div>
    </div>

    <!-- Primera vez: crear cuenta admin -->
    <div id="create-admin-form" style="display:none">
      <div class="login-box">

        <div class="fld">
          <label>Contraseña</label>

function getWeekStart(d){
  const date=new Date(d);
  const day=date.getDay();
  const diff=date.getDate()-day+(day===0?-6:1);
  const m=new Date(date.setDate(diff));
  return m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')+'-'+String(m.getDate()).padStart(2,'0');
}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function getWeekEnd(startStr){
  const d=new Date(startStr);
  d.setDate(d.getDate()+6);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function ensureActiveWeek(){
  const r=routines.find(x=>x.id===activeRid);
  if(!r)return null;
  const today=todayStr();
  const ws=getWeekStart(today);
  // Check if active week exists and matches current week
  if(activeWeekId){
    const existing=gymWeekLog.find(w=>w.id===activeWeekId);
    if(existing&&existing.weekStart===ws&&existing.routineId===activeRid)return activeWeekId;
  }
  // Check if there's already a week for this routine and week start
  const existing=gymWeekLog.find(w=>w.routineId===activeRid&&w.weekStart===ws);
  if(existing){activeWeekId=existing.id;S.s('activeWeekId',activeWeekId);return activeWeekId;}
  // New week detected — save current data to previous week before creating new one
  if(activeWeekId){
    const oldW=gymWeekLog.find(w=>w.id===activeWeekId);
    if(oldW)updateWeekLogFromCurrent();
    // Reset working data for new week
    sets={};weights={};
    S.s('sets2',sets);S.s('wts2',weights);
  }
  // Create new week
  const nw={
    id:'w_'+uid(),
    routineId:activeRid,
    routineName:r.name,
    weekStart:ws,
    weekEnd:getWeekEnd(ws),
    createdAt:Date.now(),
    completed:false,
    days:{}
  };
  r.days.forEach(d=>{
    nw.days[d.id]={
      label:d.label,
      exercises:d.exercises.map(e=>({
        name:e.name,muscle:e.muscle,series:e.series,reps:e.reps,
        weight:'',completedSets:0,totalSets:e.series
      }))
    };
  });
  gymWeekLog.push(nw);
  activeWeekId=nw.id;
  S.s('gymWeekLog',gymWeekLog);
  S.s('activeWeekId',activeWeekId);
  return activeWeekId;
}
function getActiveWeek(){
  if(!activeWeekId)return null;
  return gymWeekLog.find(w=>w.id===activeWeekId)||null;
}
function getWeekPct(weekId){
  const w=gymWeekLog.find(x=>x.id===weekId);
  if(!w)return 0;
  let total=0,done=0;
  Object.values(w.days).forEach(d=>{
    d.exercises.forEach(e=>{total+=e.totalSets;done+=e.completedSets;});
  });
  return total?Math.round((done/total)*100):0;
}
function getWeekDayPct(weekId,dayId){
  const w=gymWeekLog.find(x=>x.id===weekId);
  const d=w?.days[dayId];
  if(!d)return 0;
  let total=0,done=0;
  d.exercises.forEach(e=>{total+=e.totalSets;done+=e.completedSets;});
  return total?Math.round((done/total)*100):0;
}

function ring(id,pct,color,label,size=46){

  const ctx=c.getContext('2d'),r=size/2-4,cx=size/2,cy=size/2;

  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=3.5;ctx.stroke();
  if(pct>0){ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*(pct/100));ctx.strokeStyle=color;ctx.lineWidth=3.5;ctx.lineCap='round';ctx.stroke();}

}

function highlightFragment(text,query,maxLen){
  if(!query||!text)return esc((text||'').slice(0,(maxLen||120)));
  const q=normStr(query);const t=normStr(text);const idx=t.indexOf(q);
  if(idx<0)return esc(text.slice(0,(maxLen||120)));
  const half=Math.floor(((maxLen||120)-q.length)/2);
  const start=Math.max(0,idx-half);const end=Math.min(text.length,idx+q.length+half);
  let before=text.slice(start,idx),match=text.slice(idx,idx+q.length),after=text.slice(idx+q.length,end);
  if(start>0)before='…'+before;if(end<text.length)after=after+'…';
  return esc(before)+'<b>'+esc(match)+'</b>'+esc(after);
}

function compareWeekRow(prev,curr){
  let diffs=[];
  Object.keys(prev.days).forEach(did=>{
    const pd=prev.days[did];const cd=curr.days[did];
    if(!pd||!cd)return;
    pd.exercises.forEach((pe,i)=>{
      const ce=cd.exercises[i];
      if(!ce)return;
      const pW=parseFloat(pe.weight)||0;const cW=parseFloat(ce.weight)||0;
      if(pW>0&&cW>0&&cW!==pW){
        const arrow=cW>pW?'↑':'↓';
        const col=cW>pW?'var(--green)':'var(--red)';
        diffs.push(`<span style="font-size:10px;color:${col};font-weight:600">${esc(pe.name)}: ${pW}kg → ${cW}kg ${arrow}</span>`);
      }
    });
  });
  if(!diffs.length)return'';
  return`<div style="margin-top:8px;padding:8px 10px;background:var(--bg3);border-radius:8px;display:flex;flex-direction:column;gap:3px">${diffs.slice(0,5).join('')}${diffs.length>5?`<span style="font-size:10px;color:var(--text2)">+${diffs.length-5} más</span>`:''}</div>`;
}

function openWeekDetail(weekId){
  const w=gymWeekLog.find(x=>x.id===weekId);
  if(!w)return;
  const wpct=getWeekPct(weekId);
  let h=`<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px">

  </div>`;
  Object.entries(w.days).forEach(([did,day],di)=>{
    const col=DC[di%DC.length];let done=0,total=0;
    day.exercises.forEach(e=>{total+=e.totalSets;done+=e.completedSets;});
    const dpct=total?Math.round((done/total)*100):0;
    h+=`<div class="card" style="border-color:${col}33;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

      </div>`;
    });
    h+=`</div>`;
  });
  // Compare with previous week
  const weeks=[...gymWeekLog].filter(x=>x.routineId===w.routineId).sort((a,b)=>a.weekStart.localeCompare(b.weekStart));
  const idx=weeks.findIndex(x=>x.id===weekId);
  if(idx>0){
    const prev=weeks[idx-1];
    h+=`<div class="card" style="margin-top:14px;border-color:var(--green-b)">
      <div class="sec-t">📈 vs semana anterior (${prev.weekStart})</div>`;
    let hasDiff=false;
    Object.keys(prev.days).forEach(did=>{
      const pd=prev.days[did];const cd=w.days[did];
      if(!pd||!cd)return;
      pd.exercises.forEach((pe,i)=>{
        const ce=cd.exercises[i];
        if(!ce)return;
        const pW=parseFloat(pe.weight)||0;const cW=parseFloat(ce.weight)||0;
        if(pW>0||cW>0){
          hasDiff=true;
          const arrow=cW>pW?'↑':cW<pW?'↓':'→';
          const col=cW>pW?'var(--green)':cW<pW?'var(--red)':'var(--text2)';
          h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">

          </div>`;
        }
      });
    });
    if(!hasDiff)h+=`<div style="font-size:12px;color:var(--text2);padding:8px 0">Sin cambios de peso registrados</div>`;
    h+=`</div>`;
  }
  oOv1(h);
}

// Estima calorías: MET × peso(kg) × horas. La inclinación (cinta) sube el gasto ~4% por cada 1%.

  const p=gymProfile||{};const w=p.weight||70;

function drawCardioChart(){
  const c=document.getElementById('cardio-chart');if(!c)return;
  const ctx=c.getContext('2d');const W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  const days=_last7Keys();
  const vals=days.map(d=>cardioLog.filter(x=>x.date===d).reduce((s,x)=>s+(+x.mins||0),0));
  const max=Math.max(...vals,30);
  const n=days.length,gap=10,bw=(W-gap*(n+1))/n;
  const dayLbl=['D','L','M','M','J','V','S'];
  days.forEach((d,i)=>{
    const v=vals[i];const bh=Math.max(2,(v/max)*(H-26));
    const x=gap+i*(bw+gap),y=H-22-bh;
    const grd=ctx.createLinearGradient(0,y,0,H-22);
    grd.addColorStop(0,'#FF4D5E');grd.addColorStop(1,'rgba(255,77,94,.35)');
    ctx.fillStyle=v>0?grd:'rgba(255,255,255,.06)';
    ctx.beginPath();ctx.roundRect(x,y,bw,bh,[4,4,0,0]);ctx.fill();
    ctx.fillStyle='#71748A';ctx.font='9px Inter,sans-serif';ctx.textAlign='center';
    const dd=new Date(d+'T00:00:00');
    ctx.fillText(dayLbl[dd.getDay()],x+bw/2,H-8);
    if(v>0){ctx.fillStyle='#F4F5FA';ctx.font='bold 9px JetBrains Mono';ctx.fillText(v,x+bw/2,y-3);}
  });
}

let _gps={watchId:null,points:[],dist:0,startTs:0,timerIv:null,last:null,type:'correr'};
// Distancia entre 2 coords (Haversine, en metros)
function _haversine(a,b){
  const R=6371000,toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat),dLng=toR(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));
}
function openGPS(){
  if(!('geolocation' in navigator)){tst('Tu dispositivo no tiene GPS disponible');return;}
  oOv1(`<div class="mt">📍 Salida con GPS</div>

function gpsStart(){
  _gps.type=document.getElementById('gps-type')?.value||'correr';

  // Pantalla de tracking en vivo
  oOv1(`<div class="mt">📍 ${(CARDIO_TYPES[_gps.type]||{}).label||'Salida'}</div>
    <div style="text-align:center;padding:10px 0 20px">

    <button class="btn b-lg" style="background:var(--red);color:#fff" onclick="gpsStop()">⏹ Terminar y guardar</button>`);
  // Cronómetro
  _gps.timerIv=setInterval(gpsUpdateUI,1000);
  // Seguimiento de posición
  try{
    _gps.watchId=navigator.geolocation.watchPosition(gpsOnPos,gpsOnErr,{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
  }catch(e){tst('Error al iniciar GPS: '+e.message,4000);}
}
function gpsOnPos(pos){
  const st=document.getElementById('gps-status');
  if(st){st.textContent='📡 GPS activo · señal '+(pos.coords.accuracy<20?'buena':'regular');st.style.color='var(--green)';}
  const p={lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()};
  // Ignorar saltos imprecisos (accuracy mala o salto irreal)
  if(pos.coords.accuracy>40)return;
  if(_gps.last){
    const d=_haversine(_gps.last,p);
    if(d>1&&d<200)_gps.dist+=d; // entre 1m y 200m por lectura (filtra ruido)
  }
  _gps.last=p;_gps.points.push(p);
  gpsUpdateUI();
}
function gpsOnErr(err){
  const st=document.getElementById('gps-status');
  if(st){st.textContent=err.code===1?'🔕 Permiso de ubicación denegado':'📡 Sin señal GPS…';st.style.color='var(--red)';}
}
function gpsUpdateUI(){
  const km=_gps.dist/1000;
  const secs=Math.floor((Date.now()-_gps.startTs)/1000);
  const de=document.getElementById('gps-dist');if(de)de.textContent=km.toFixed(2);
  const te=document.getElementById('gps-time');if(te)te.textContent=Math.floor(secs/60)+':'+String(secs%60).padStart(2,'0');
  const pe=document.getElementById('gps-pace');

  const ce=document.getElementById('gps-cal');if(ce)ce.textContent=cardioCalories(_gps.type,secs/60,0);
}
function gpsStop(){
  if(_gps.watchId!=null){try{navigator.geolocation.clearWatch(_gps.watchId);}catch(e){}_gps.watchId=null;}
  if(_gps.timerIv){clearInterval(_gps.timerIv);_gps.timerIv=null;}
  const km=+(_gps.dist/1000).toFixed(2);
  const mins=Math.max(1,Math.round((Date.now()-_gps.startTs)/60000));
  if(km<0.05){cOv1();tst('Salida muy corta, no se guardó');return;}
  const cal=cardioCalories(_gps.type,mins,0);
  const now=new Date();
  cardioLog.unshift({ts:now.getTime(),date:now.toISOString().slice(0,10),type:_gps.type,mins,km,cal,gps:true});
  if(cardioLog.length>200)cardioLog=cardioLog.slice(0,200);
  S.s('cardio1',cardioLog);
  cOv1();renderGym();
  tst(`📍 ${km} km en ${mins} min · ${cal} kcal`);
}

// Objetivo calórico diario según peso + tipo de dieta
function dailyCalorieGoal(){
  const p=gymProfile||{};const nd=nutData||{};
  if(!p.weight)return 0;
  const w=p.weight;
  // base: mantenimiento aprox = peso × 30 (sedentario-moderado)
  let base=w*30;
  switch(nd.dietType){
    case 'bajar_lento':base-=350;break;
    case 'bajar_rapido':base-=600;break;
    case 'masa':base+=400;break;
    case 'keto':base-=300;break;
    case 'recomp':base-=100;break;
  }
  return Math.max(1000,Math.round(base/10)*10);
}

function addFoodPhoto(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0];if(!file)return;
    const gkey=(S.g('gemini_key','')||'').trim();
    if(!gkey){tst('La foto de comida usa Gemini. Pegá una key de Gemini en Config.',5000);return;}
    tst('📷 Analizando comida…',2500);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      const prompt='En la foto hay comida. Identificá qué es y estimá calorías y proteínas totales del plato. Respondé SOLO JSON: {"name":"descripción corta","cal":número,"prot":número}';
      const resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent',
        {method:'POST',headers:{'Content-Type':'application/json','X-goog-api-key':gkey},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:file.type||'image/jpeg',data:b64}}]}]})});
      if(!resp.ok)throw new Error('Gemini '+resp.status);
      const data=await resp.json();
      const txt=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
      const j=_extractJSON(txt);
      if(!j)throw new Error('No pude identificar la comida');
      const o=JSON.parse(j);
      const today=todayStr();
      if(!nutData.foodLog)nutData.foodLog={};
      if(!nutData.foodLog[today])nutData.foodLog[today]=[];
      nutData.foodLog[today].push({name:o.name||'Comida',cal:Math.round(o.cal||0),prot:Math.round(o.prot||0),t:Date.now()});
      S.s('nutData',nutData);tst('✓ '+(o.name||'Comida')+': '+Math.round(o.cal||0)+' kcal');renderGym();
    }catch(e){tst('⚠️ '+e.message,4000);}
  };
  inp.click();
}

    '- aguaRecomendada en litros\n'+
    '- consejo corto y motivador';

  try{
    const res=await _gemini(prompt,key);
    if(!res.ok){tst('⚠️ Gemini: '+res.status,4000);return;}
    const data=await res.json();
    let text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const jsonStr=_extractJSON(text);
    if(!jsonStr){tst('No se pudo generar el plan',3000);return;}
    const plan=JSON.parse(jsonStr);
    if(!plan.plan||!plan.plan.length){tst('Plan vacío, intentá de nuevo',3000);return;}
    renderDietPlan(plan);
  }catch(e){
    tst('⚠️ Error: '+e.message,4000);
  }
}

function renderDietPlan(plan){
  let html='';
  let totalCals=0,totalProts=0;
  plan.plan.forEach(m=>{
    totalCals+=m.calorias||0;totalProts+=m.proteinas||0;
    const icon=m.momento.includes('Desayuno')?'🌅':m.momento.includes('Mañana')?'🍎':m.momento.includes('Almuerzo')?'🍗':m.momento.includes('Merienda')?'🍵':m.momento.includes('Cena')?'🌙':m.momento.includes('entreno')?'💪':'';
    html+=`<div class="crd" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="font-weight:700;font-size:13px">${icon} ${esc(m.momento)}</div>
        <div style="text-align:right;font-size:11px">
          <span style="color:var(--red);font-weight:700">${m.calorias||'—'}</span>
          <span style="color:var(--text2)"> · </span>
          <span style="color:var(--blue);font-weight:700">${m.proteinas||'—'}g</span>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text1);margin-top:5px;line-height:1.5">${esc(m.comida||'')}</div>
      ${m.nota?`<div style="font-size:10px;color:var(--text2);margin-top:4px">💡 ${esc(m.nota)}</div>`:''}
    </div>`;
  });
  html+=`<div class="card" style="border-color:var(--green-b);background:rgba(0,196,140,.04);margin-top:4px">
    <div style="display:flex;justify-content:space-between;font-weight:700;font-size:14px">
      <span>📊 Totales</span>
      <span><span style="color:var(--red)">${totalCals} cal</span> · <span style="color:var(--blue)">${totalProts}g prot</span></span>
    </div>
    ${plan.consejo?`<div style="font-size:11px;color:var(--text2);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">💡 ${esc(plan.consejo)}</div>`:''}
    ${plan.aguaRecomendada?`<div style="font-size:11px;color:var(--blue);margin-top:4px">💧 Agua recomendada: ${esc(plan.aguaRecomendada)}</div>`:''}
  </div>`;

  // Save to nutData
  nutData.mealPlans=nutData.mealPlans||[];
  nutData.mealPlans.push({date:todayStr(),html,plan});
  nutData.lastPlanDate=todayStr();
  S.s('nutData',nutData);
  // Update UI
  const container=document.getElementById('diet-plan-container');
  if(container)container.innerHTML=html;
  document.getElementById('diet-plan-container')?.scrollIntoView({behavior:'smooth'});
  tst('🥗 Plan generado');
}

function drawTimerRing(){const c=document.getElementById('tr');if(!c)return;const ctx=c.getContext('2d'),r=62,cx=75,cy=75;ctx.clearRect(0,0,150,150);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=8;ctx.stroke();const pct=timerS/timerP;if(pct>0){ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.strokeStyle=timerS<15?'#FF3B4E':timerS<30?'#FFB347':'#00C48C';ctx.lineWidth=8;ctx.lineCap='round';ctx.stroke();}const m=Math.floor(timerS/60),s=timerS%60;ctx.fillStyle='#fff';ctx.font='bold 30px JetBrains Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,cx,cy);}

function saveGymProfile(){
  const height=parseFloat(document.getElementById('gp-height')?.value)||0;
  const weight=parseFloat(document.getElementById('gp-weight')?.value)||0;
  const experience=parseInt(document.getElementById('gp-exp')?.value)||0;
  const goal=document.getElementById('gp-goal')?.value||'hipertrofia';
  const dietRestrictions=(document.getElementById('gp-diet')?.value||'').trim();
  gymProfile={height,weight,experience,goal,dietRestrictions};
  S.s('gymProfile',gymProfile);
  cOv1();tst('✓ Perfil guardado');
}

function updateWeekLogFromCurrent(){
  if(!activeWeekId||!activeRid)return;
  const w=gymWeekLog.find(x=>x.id===activeWeekId);
  const r=routines.find(x=>x.id===activeRid);
  if(!w||!r)return;
  r.days.forEach(d=>{
    if(!w.days[d.id])return;
    d.exercises.forEach((ex,ei)=>{
      if(!w.days[d.id].exercises[ei])return;
      const wk=`${activeRid}|${d.id}|${ei}`;
      w.days[d.id].exercises[ei].weight=weights[wk]||'';
      let completed=0;
      for(let si=0;si<ex.series;si++){
        if(sets[`${activeRid}|${d.id}|${ei}|${si}`])completed++;
      }
      w.days[d.id].exercises[ei].completedSets=completed;
    });
  });
  S.s('gymWeekLog',gymWeekLog);
}

function startNewWeek(){
  if(!activeRid){tst('Activá una rutina primero');return;}
  const today=todayStr();
  const ws=getWeekStart(today);
  // Freeze current week data
  updateWeekLogFromCurrent();
  // Reset sets & weights for new week
  sets={};weights={};
  S.s('sets2',sets);S.s('wts2',weights);
  // Mark old week as completed
  if(activeWeekId){
    const oldW=gymWeekLog.find(w=>w.id===activeWeekId);
    if(oldW)oldW.completed=true;
  }
  // Create new week
  const r=routines.find(x=>x.id===activeRid);
  if(!r)return;
  const nw={
    id:'w_'+uid(),
    routineId:activeRid,
    routineName:r.name,
    weekStart:ws,
    weekEnd:getWeekEnd(ws),
    createdAt:Date.now(),
    completed:false,
    days:{}
  };
  r.days.forEach(d=>{
    nw.days[d.id]={
      label:d.label,
      exercises:d.exercises.map(e=>({
        name:e.name,muscle:e.muscle,series:e.series,reps:e.reps,
        weight:'',completedSets:0,totalSets:e.series
      }))
    };
  });
  gymWeekLog.push(nw);
  activeWeekId=nw.id;
  S.s('gymWeekLog',gymWeekLog);
  S.s('activeWeekId',activeWeekId);
  tst('✅ Nueva semana iniciada');
  renderGym();
}

function renderGastos(){

function ensureCardCats(){
  let changed=false;
  cards.forEach(card=>{
    if(!cats.find(c=>c.cardRef===card.id)){
      cats.push({id:'card_'+card.id,n:card.name,c:card.color,base:0,cardRef:card.id});
      changed=true;
    }
  });
  cats.forEach(c=>{if(c.cardRef&&!cards.find(crd=>crd.id===c.cardRef)){cats=cats.filter(x=>x.id!==c.id);changed=true;}});
  if(changed)S.s('cats4',cats);
}

function k(catId,m,y){return `${catId}_${m}_${y}`}
function km(m,y){return `${m}_${y}`}
function montoPago(catId,m,y){const cat=cats.find(x=>x.id===catId);const ky=k(catId,m,y);if(pagosFijos[ky]!==undefined)return pagosFijos[ky];if(cat&&cat.cardRef)return getCardMonthAmt(cat.cardRef,m,y);return cat?.base||0;}
function setMontoPago(catId,m,y,v){pagosFijos[k(catId,m,y)]=v;S.s('pf4',pagosFijos);}
function isPaid(catId,m,y){return !!pagosEstado[k(catId,m,y)]}
function togPaid(catId,m,y){pagosEstado[k(catId,m,y)]=!pagosEstado[k(catId,m,y)];S.s('pe4',pagosEstado);}
function getSueldo(m,y){return sueldos[km(m,y)]||0;}
function setSueldo(m,y,v){sueldos[km(m,y)]=v;S.s('sld4',sueldos);}

function totalCatMes(catId,m,y){return sumMoney(gastos.filter(g=>g.c===catId&&g.m===m&&g.y===y),g=>g.v);}
function montoCat(c,m,y){
  const ky=k(c.id,m,y);
  if(!c.cardRef)return pagosFijos[ky]!==undefined?money(pagosFijos[ky]):money(c.base);
  return pagosFijos[ky]!==undefined?money(pagosFijos[ky]):getCardMonthAmt(c.cardRef,m,y);
}
function totalCompromisosMes(m,y){
  let t=0;
  cats.forEach(c=>{
    if(c.cardRef)return;
    if(c.ahorro)return;
    const monto=montoCat(c,m,y);
    if(monto>0)t=money(t+monto);
  });
  return t;
}
function totalAhorroMes(m,y){
  let t=0;
  cats.forEach(c=>{
    if(!c.ahorro)return;
    const monto=montoCat(c,m,y);
    if(monto>0)t=money(t+monto);
  });
  return t;
}
function ahorroAcumCat(catId){
  let t=0;
  const prefix=catId+'_';
  Object.keys(pagosFijos).forEach(key=>{
    if(!key.startsWith(prefix))return;
    const rest=key.slice(prefix.length);
    if(/^\d+_\d+$/.test(rest))t=money(t+pagosFijos[key]);
  });
  return t;
}
function ahorroAcumTotal(){
  let t=0;
  cats.forEach(c=>{if(c.ahorro)t=money(t+ahorroAcumCat(c.id));});
  return t;
}
function totalPagadoMes(m,y){
  let t=0;
  cats.forEach(c=>{
    if(c.cardRef)return;
    if(c.ahorro)return;
    const ky=k(c.id,m,y);
    if(!pagosEstado[ky])return;
    const monto=montoCat(c,m,y);
    if(monto>0)t=money(t+monto);
  });
  return t;
}
function gastosVariablesMes(m,y){return gastos.filter(g=>g.m===m&&g.y===y);}
function totalVariablesMes(m,y){return sumMoney(gastosVariablesMes(m,y),g=>g.v);}
function totalCardMonth(){
  return sumMoney(cards,card=>getCardMonthAmt(card.id));
}
function getCardMonthAmtAll(){
  const r={};
  cards.forEach(card=>{const a=getCardMonthAmt(card.id);if(a>0)r[card.id]={name:card.name,type:card.type,color:card.color,amt:a};});
  return r;
}
function totalGastosMes(m,y){
  let t=0;
  cats.forEach(c=>{if(c.ahorro)return;const mt=montoCat(c,m,y);if(mt>0)t=money(t+mt);});
  return money(t+totalVariablesMes(m,y));
}
function totalCatAnio(catId,y){
  const cat=cats.find(x=>x.id===catId);
  if(!cat)return 0;
  if(cat.cardRef){
    return sumMoney(getCardPurchs(cat.cardRef),p=>pInstAmt(p)*pRemaining(p));
  }
  let t=0;
  for(let m=0;m<12;m++){t=money(t+montoCat(cat,m,y));}
  t=money(t+sumMoney(gastos.filter(g=>g.y===y&&g.c===catId),g=>g.v));
  return t;

}

function delta(actual,anterior){if(!anterior)return null;const d=actual-anterior;const pct=Math.round((d/anterior)*100);return{d,pct,up:d>0};}

function tieneDatos(m,y){
  for(const c of cats){if(pagosFijos[k(c.id,m,y)]!==undefined)return true;}
  for(const g of gastos)if(g.m===m&&g.y===y)return true;
  if(cats.some(c=>c.cardRef&&montoCat(c,m,y)>0))return true;
  return false;
}

          <div style="width:${Math.min(pct,100)}%;height:100%;background:${barCol};border-radius:3px;transition:width .4s"></div>

        <div style="font-size:10px;color:var(--text2);white-space:nowrap">${fmtFull(total)} / ${fmtFull(lim)} · <span style="color:${barCol};font-weight:700">${pct}%</span></div>
      </div>`;
    })()}`;
  });

  const variables_list=gastosVariablesMes(m,y);

  if(variables_list.length){
    h+=`<div class="sec-t" style="margin-top:18px">Gastos variables (${variables_list.length})</div>
    <div class="card">`;
    variables_list.slice().reverse().forEach(g=>{
      const cat=cats.find(c=>c.id===g.c)||{n:'Otro',c:'#aaa'};
      h+=`<div class="exp">
        <div class="cdot" style="background:${cat.c}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.desc||cat.n)}</div>
          <div style="font-size:10px;color:var(--text2)">${esc(cat.n)} · ${g.f||''}</div>
        </div>
        <input class="amt-inp" type="text" inputmode="decimal" value="${g.v}"
          onfocus="this.select()" onchange="onVarChange(${g._id},this.value)" style="width:80px;font-size:12px">
        <button onclick="delGasto(${g._id})" style="color:var(--text3);font-size:14px;margin-left:6px;flex-shrink:0">✕</button>
      </div>`;
    });
    h+='</div>';
  }

  h+=`<button class="btn b-lg b-p" style="margin-top:14px" onclick="xTab(5)">+ Agregar gasto variable</button>`;
  h+=`<button class="btn b-lg b-g" style="margin-top:10px" onclick="analizarGastos()" id="btn-analizar">🔍 Analizar mis gastos</button>`;
  return h+'</div>';
}

function onSueldoChange(v){const val=parseMoney(v);setSueldo(curM,curY,val);}
function onMontoChange(catId,m,y,v){const val=parseMoney(v);setMontoPago(catId,m,y,val);tst('Monto actualizado');renderGastos();}
function onTogglePaid(catId,m,y){togPaid(catId,m,y);const c=cats.find(x=>x.id===catId);tst(isPaid(catId,m,y)?`✅ ${c?.n}`:`↩ ${c?.n}`);renderGastos();}
function onVarChange(id,v){const g=gastos.find(x=>x._id===id);if(g){g.v=parseMoney(v);S.s('gst4',gastos);tst('Gasto actualizado');renderGastos();}}

async function analizarGastos(){
  const key=aiKey();
  if(!key){tst('Configurá la IA primero',3500);return;}
  const m=curM,y=curY;
  const sueldo=getSueldo(m,y);
  const fijos=totalCompromisosMes(m,y);
  const vars=totalVariablesMes(m,y);
  const cardTotal=sumMoney(cats.filter(c=>c.cardRef),c=>montoCat(c,m,y));
  const total=totalGastosMes(m,y);
  if(!sueldo&&!fijos&&!vars&&!cardTotal){
    tst('No hay datos de gastos para analizar en este mes',3500);
    return;
  }
  const btn=document.getElementById('btn-analizar');
  if(btn){btn.textContent='⏳ Analizando…';btn.disabled=true;}
  const mLabel=MONTHS[m];
  let catLines=cats.filter(c=>montoCat(c,m,y)>0||gastos.some(g=>g.c===c.id&&g.m===m&&g.y===y)).map(c=>{
    const cFijo=montoCat(c,m,y);
    const cVar=sumMoney(gastos.filter(g=>g.c===c.id&&g.m===m&&g.y===y),g=>g.v);
    const cTotal=money(cFijo+cVar);
    const lim=c.limite?' (límite '+fmtFull(c.limite)+')':'';
    return '  - '+c.n+': '+fmtFull(cTotal)+lim;
  }).join('\n');
  const resumen='Mes: '+mLabel+' '+y+'\n'+
    'Ingreso (sueldo): '+(sueldo>0?fmtFull(sueldo):'No cargado')+'\n'+
    'Compromisos fijos: '+fmtFull(fijos)+'\n'+
    'Gastos variables: '+fmtFull(vars)+'\n'+
    'Tarjetas: '+fmtFull(cardTotal)+'\n'+
    'Total gastado: '+fmtFull(total)+'\n'+
    'Desglose por categoría:\n'+catLines;
  const prompt='Sos un asesor financiero personal. Dado el siguiente resumen del mes, dame un diagnóstico breve (2-3 frases) y 3-4 recomendaciones concretas de ahorro.\n'+
    'REGLAS:\n- Español uruguayo, tono directo y útil\n- NO inventes números: usá solo los del resumen\n- Si detectás una oportunidad clara de ahorro, podés sugerir crear una meta con [ACCION]{"op":"crear_meta","nombre":"...","aporte":0,"objetivo":0}[/ACCION]\n'+
    '- Respondé SOLO con el diagnóstico y recomendaciones en texto plano con **negrita** para énfasis, más las [ACCION] si corresponde. Nada más.\n\n'+
    'RESUMEN:\n'+resumen;
  try{
    const texto=await _aiComplete(prompt);
    let reply=texto||'(sin respuesta)';
    const actionRegex=/\[ACCION\]([\s\S]*?)\[\/ACCION\]/g;
    let match;const resultados=[];
    while((match=actionRegex.exec(reply))!==null){
      try{resultados.push(ejecutarAccion(JSON.parse(match[1])));}
      catch(e){resultados.push('Error en acción: '+e.message);}
    }
    if(resultados.length){
      reply=reply.replace(/\[ACCION\][\s\S]*?\[\/ACCION\]/g,'').trim();
      if(reply)reply+='\n\n';
      reply+='✅ Acciones ejecutadas:\n'+resultados.map(r=>'• '+r).join('\n');
      cats=S.g('cats4',[]);
      renderGastos();
    }
    oOv1(`<div class="mt">🔍 Análisis de gastos</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.7">${_mdBold(reply).replace(/\n/g,'<br>')}</div>
      <button class="btn b-lg b-p" onclick="cOv1()">Cerrar</button>`);
  }catch(e){
    tst('⚠️ Error al analizar: '+e.message,4000);
  }
  if(btn){btn.textContent='🔍 Analizar mis gastos';btn.disabled=false;}
}

// ── TAB 1: PAGOS ──
function rPagos(){

  let h=`<div class="sec">`+mnav(m,y);
  h+=`<div class="card" style="margin-bottom:16px;border-color:${pct===100?'var(--green-b)':'var(--blue-b)'};background:${pct===100?'rgba(0,196,140,.04)':'rgba(59,127,255,.03)'}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">

        <div style="font-size:11px;color:var(--text2);font-weight:600">Estado de pagos</div>

        ${restante>0?`<div style="font-size:11px;color:var(--gold);margin-top:4px">Falta pagar: <strong>${fmtFull(restante)}</strong></div>`:totalC>0?`<div style="font-size:11px;color:var(--green);margin-top:4px">✅ Todo pagado este mes</div>`:''}
      </div>

    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${pct===100?'var(--green)':'var(--blue)'}"></div></div>
  </div>`;

  const catsConMonto=cats.filter(c=>montoCat(c,m,y)>0);
  const pendientes=catsConMonto.filter(c=>!isPaid(c.id,m,y));
  const pagados=catsConMonto.filter(c=>isPaid(c.id,m,y));

  if(pendientes.length){
    h+=`<div class="sec-t">Pendientes (${pendientes.length})</div>`;

      const isCard=!!cat.cardRef;

        <div style="width:36px;height:36px;border-radius:10px;background:${cat.c}18;border:1px solid ${cat.c}44;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <div class="cdot" style="background:${cat.c};width:11px;height:11px"></div>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${esc(cat.n)}</div>
          <div style="font-size:13px;color:${cat.c};font-family:var(--fm);font-weight:700;margin-top:2px">${fmtFull(monto)}${isCard?' <span style="font-size:10px;color:var(--purple)">💳</span>':''}</div>
        </div>
        <button class="paid-btn no" onclick="${isCard?'event.stopPropagation();':''}onTogglePaid('${cat.id}',${m},${y})" style="padding:8px 14px;font-size:11px">MARCAR PAGO</button>
      </div>`;
    });
  }

  if(pagados.length){
    h+=`<div class="sec-t" style="margin-top:18px">Pagados (${pagados.length}) ✓</div>`;
    pagados.forEach(cat=>{
      const monto=montoPago(cat.id,m,y);
      if(!monto)return;
      const isCard=!!cat.cardRef;
      h+=`<div class="pres-row paid">
        <div style="width:36px;height:36px;border-radius:10px;background:var(--green-d);border:1px solid var(--green-b);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green);font-size:16px;font-weight:700">✓</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;text-decoration:line-through;color:var(--text2)">${esc(cat.n)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${fmtFull(monto)}${isCard?' 💳':''}</div>
        </div>

  if(!catsConMonto.length){

  }

  return h+'</div>';
}

// ── TAB 2: ANUAL — REPORTE COMPLETO ──
function rAnual(){
  const y=curY;
  const prevY=y-1;
  let h=`<div class="sec">`;
  h+=`<div class="mnav" style="justify-content:space-between">
    <button class="mnav-b" onclick="curY--;renderGastos()">‹</button>
    <div class="mnav-l">Reporte ${y}</div>
    <button class="mnav-b" onclick="curY++;renderGastos()">›</button>
  </div>`;

  const data=MS.map((_,i)=>({m:i,t:totalGastosMes(i,y),s:getSueldo(i,y),c:totalCompromisosMes(i,y),v:totalVariablesMes(i,y),tieneDatos:tieneDatos(i,y)}));
  const dataAnt=MS.map((_,i)=>({m:i,t:totalGastosMes(i,prevY),s:getSueldo(i,prevY)}));
  
  const totalAnual=data.reduce((s,x)=>s+x.t,0);
  const totalAnualAnt=dataAnt.reduce((s,x)=>s+x.t,0);
  const sueldoAnual=data.reduce((s,x)=>s+x.s,0);
  const ahorroAnual=sueldoAnual-totalAnual;
  const conDatos=data.filter(x=>x.tieneDatos).length;

  // HERO — Balance General
  h+=`<div class="hero">
    <div class="hero-bg" style="background:${ahorroAnual>=0?'var(--green)':'var(--red)'}"></div>
    <div class="hero-l">📊 Balance ${y}</div>
    <div class="hero-v" style="color:${totalAnual>0?'var(--text0)':'var(--text2)'}">${fmtFull(totalAnual)}</div>
    <div class="hero-s">Total gastado en ${conDatos} ${conDatos===1?'mes':'meses'}</div>
  </div>`;

  // Comparativa con año anterior
  if(totalAnualAnt>0){
    const dlt=delta(totalAnual,totalAnualAnt);
    const dCls=dlt.up?'delta-up':'delta-dn';
    const arrow=dlt.up?'↑':'↓';
    h+=`<div class="alert ${dlt.up?'al-warn':'al-suc'}" style="margin-bottom:14px">
      <div class="al-i">${dlt.up?'📈':'📉'}</div>
      <div class="al-t"><strong>vs ${prevY}:</strong> ${fmtFull(totalAnualAnt)}<br>
      <span class="delta ${dCls}">${arrow} ${fmtFull(Math.abs(dlt.d))} (${dlt.up?'+':''}${dlt.pct}%)</span>
      ${dlt.up?' — Gastaste más que el año pasado':' — ¡Bajaste tus gastos respecto al año pasado!'}</div>
    </div>`;
  }

  h+=`<div class="stats s2" style="margin-bottom:14px">
    <div class="st"><div class="sv" style="color:var(--blue);font-size:15px">${fmt(sueldoAnual)}</div><div class="sl">Ingresos ${y}</div></div>
    <div class="st"><div class="sv" style="color:var(--red);font-size:15px">${fmt(totalAnual)}</div><div class="sl">Gastos ${y}</div></div>
    <div class="st"><div class="sv" style="color:${ahorroAnual>=0?'var(--green)':'var(--red)'};font-size:15px">${fmt(Math.abs(ahorroAnual))}</div><div class="sl">${ahorroAnual>=0?'💚 Ahorro':'🔴 Déficit'}</div></div>
    <div class="st"><div class="sv" style="color:var(--text1);font-size:15px">${conDatos}/12</div><div class="sl">Meses con datos</div></div>
  </div>`;

  // CHART — Gasto por mes
  const maxV=Math.max(...data.map(x=>Math.max(x.t,x.s)),...dataAnt.map(x=>x.t),1);
  h+=`<div class="card" style="margin-bottom:14px">
    <div class="sec-t">📈 Gasto mensual · ${y} vs ${prevY}</div>
    <div class="bar-c">
      ${data.map((md,i)=>{
        const ht=md.t>0?Math.max(Math.round((md.t/maxV)*88),3):0;
        const htAnt=dataAnt[i].t>0?Math.max(Math.round((dataAnt[i].t/maxV)*88),3):0;
        const isNow=md.m===new Date().getMonth()&&y===new Date().getFullYear();
        const col=isNow?'var(--red)':md.t>0?'var(--blue)':'var(--bg4)';
        return`<div class="bar-col" onclick="curM=${md.m};xTab(0)">
          <div style="display:flex;align-items:flex-end;gap:2px;height:88px;width:100%">
            ${htAnt>0?`<div style="height:${htAnt}px;background:var(--text3);opacity:.6;flex:1;border-radius:3px 3px 0 0;min-height:2px"></div>`:`<div style="flex:1"></div>`}
            ${ht>0?`<div style="height:${ht}px;background:${col};flex:1;border-radius:3px 3px 0 0;min-height:2px"></div>`:`<div style="flex:1"></div>`}
          </div>
          <div class="bar-l" style="color:${isNow?'var(--red)':'var(--text2)'};font-weight:${isNow?700:600}">${MS[md.m]}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:14px;margin-top:14px;justify-content:center;font-size:10px;color:var(--text2)">
      <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--text3);opacity:.6"></div>${prevY}</div>
      <div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:var(--blue)"></div>${y}</div>

        <div class="yr-num">${fmt(totalAnual)}</div>
        <div class="yr-num" style="color:${totalAnual>totalAnualAnt?'var(--red)':totalAnual<totalAnualAnt?'var(--green)':'var(--text2)'};font-size:11px">${totalAnualAnt>0?fmt(totalAnual-totalAnualAnt):'—'}</div>

  const catData=cats.map(c=>{
    const tot=totalCatAnio(c.id,y);
    const totAnt=totalCatAnio(c.id,prevY);
    return{...c,tot,totAnt,d:tot-totAnt};

          <div style="font-family:var(--fm);font-size:11px;color:${c.c};width:64px;text-align:right;font-weight:700">${fmt(c.tot)}</div>
        </div>

    });
  }

  // INSIGHTS
  const conGastos=data.filter(x=>x.t>0);
  if(conGastos.length>=2){
    const mejor=conGastos.reduce((a,b)=>a.t<b.t?a:b);
    const peor=conGastos.reduce((a,b)=>a.t>b.t?a:b);

        </div>
        <div class="crd" style="border-color:var(--red-b)">
          <div style="font-size:9px;color:var(--red);font-weight:700;letter-spacing:1px;margin-bottom:3px">🔴 PEOR MES</div>
          <div style="font-family:var(--fd);font-size:14px;font-weight:800">${MONTHS[peor.m]}</div>
          <div style="font-size:12px;color:var(--red);font-family:var(--fm)">${fmtFull(peor.t)}</div>
        </div>
      </div>
      <div style="padding:12px 14px;background:var(--bg3);border-radius:10px;font-size:12px;color:var(--text1);line-height:1.8">
        📊 <strong>Promedio mensual:</strong> ${fmtFull(prom)}<br>

      ${bajo.length?`<div style="margin-top:10px;padding:11px 13px;background:var(--green-d);border:1px solid var(--green-b);border-radius:10px">

// ── TAB 3: COMPARAR ──
function rComparar(){
  let h=`<div class="sec"><div class="sec-t">🔍 Comparar 2 meses · Detectá dónde bajar gastos</div>`;
  
  const mA=window._cmpA??(curM===0?11:curM-1);
  const yA=window._cmpAY??(curM===0?curY-1:curY);
  const mB=window._cmpB??curM;
  const yB=window._cmpBY??curY;

  // Genera opciones para los últimos 36 meses + algunos del 2025
  const opts=[];
  for(let yr=2025;yr<=curY+1;yr++){
    for(let mn=0;mn<12;mn++){
      opts.push({m:mn,y:yr,label:`${MONTHS[mn]} ${yr}`});
    }
  }

  h+=`<div class="inp-r" style="margin-bottom:14px">
    <div class="crd">
      <div style="font-size:9px;color:var(--text2);letter-spacing:1.5px;font-weight:700;margin-bottom:5px">MES A</div>
      <select class="inp" onchange="setCmp('A',this.value)" style="padding:8px 10px;font-size:13px">
        ${opts.map(o=>`<option value="${o.m}_${o.y}" ${o.m===mA&&o.y===yA?'selected':''}>${o.label}</option>`).join('')}
      </select>
      <div style="font-family:var(--fm);font-size:17px;font-weight:700;color:var(--text1);margin-top:8px">${fmtFull(totalGastosMes(mA,yA))}</div>
    </div>
    <div class="crd">
      <div style="font-size:9px;color:var(--text2);letter-spacing:1.5px;font-weight:700;margin-bottom:5px">MES B</div>
      <select class="inp" onchange="setCmp('B',this.value)" style="padding:8px 10px;font-size:13px">
        ${opts.map(o=>`<option value="${o.m}_${o.y}" ${o.m===mB&&o.y===yB?'selected':''}>${o.label}</option>`).join('')}
      </select>
      <div style="font-family:var(--fm);font-size:17px;font-weight:700;color:var(--text0);margin-top:8px">${fmtFull(totalGastosMes(mB,yB))}</div>
    </div>
  </div>`;

  const totalA=totalGastosMes(mA,yA);
  const totalB=totalGastosMes(mB,yB);
  const diff=totalB-totalA;
  const pct=totalA>0?Math.round((diff/totalA)*100):0;

  h+=`<div class="alert ${diff>0?'al-warn':diff<0?'al-suc':'al-info'}" style="margin-bottom:14px">
    <div class="al-i">${diff>0?'📈':diff<0?'📉':'➡️'}</div>
    <div class="al-t"><strong>Diferencia: ${fmtFull(Math.abs(diff))} ${diff>0?'MÁS':diff<0?'MENOS':'igual'}</strong> (${diff>0?'+':''}${pct}%)<br>
    ${diff>0?'Estás gastando más. Revisá las categorías que subieron.':diff<0?'¡Excelente! Bajaste el gasto.':'Sin cambios respecto al mes anterior.'}</div>
  </div>`;

  h+=`<div class="sec-t">Por categoría · Dónde cambió el gasto</div>`;
  const compData=cats.map(cat=>{
    const aP=montoCat(cat,mA,yA);
    const aV=gastos.filter(g=>g.m===mA&&g.y===yA&&g.c===cat.id).reduce((s,g)=>s+g.v,0);
    const bP=montoCat(cat,mB,yB);
    const bV=gastos.filter(g=>g.m===mB&&g.y===yB&&g.c===cat.id).reduce((s,g)=>s+g.v,0);
    const a=aP+aV,b=bP+bV;
    return{...cat,a,b,d:b-a};
  }).filter(x=>x.a>0||x.b>0).sort((a,b)=>Math.abs(b.d)-Math.abs(a.d));

  if(compData.length){
    compData.forEach(c=>{
      const up=c.d>0,dn=c.d<0,eq=c.d===0;
      const arrow=up?'↑':dn?'↓':'→';
      const dCol=up?'var(--red)':dn?'var(--green)':'var(--text2)';
      const pctC=c.a>0?Math.round((c.d/c.a)*100):(c.b>0?100:0);
      h+=`<div class="crd" style="margin-bottom:8px;border-color:${up?'var(--red-b)':dn?'var(--green-b)':'var(--border)'}">
        <div style="display:flex;align-items:center;gap:9px">
          <div class="cdot" style="background:${c.c};width:11px;height:11px"></div>
          <div style="flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.n)}</div>
          <div style="text-align:right">
            <div style="font-family:var(--fm);font-size:13px;font-weight:700;color:${dCol}">${arrow} ${fmt(Math.abs(c.d))}</div>
            ${!eq?`<div style="font-size:10px;color:${dCol}">${up?'+':''}${pctC}%</div>`:''}
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;font-size:11px;color:var(--text2)">
          <div style="flex:1">A: <span style="color:var(--text1);font-family:var(--fm)">${fmt(c.a)}</span></div>
          <div style="flex:1">B: <span style="color:var(--text0);font-family:var(--fm);font-weight:700">${fmt(c.b)}</span></div>
        </div>
      </div>`;
    });

    const subieron=compData.filter(c=>c.d>0).slice(0,3);
    const bajaron=compData.filter(c=>c.d<0).slice(0,3);
    h+=`<div class="card" style="margin-top:14px">
      <div class="sec-t">🎯 Plan de acción</div>`;
    if(subieron.length){
      h+=`<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:var(--red);margin-bottom:6px">📈 Revisá estos gastos que subieron:</div>
        ${subieron.map(s=>`<div style="font-size:12px;color:var(--text1);padding:4px 0">• <strong>${esc(s.n)}</strong>: +${fmtFull(s.d)}</div>`).join('')}
      </div>`;
    }
    if(bajaron.length){
      h+=`<div>
        <div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:6px">📉 ¡Bien! Estos bajaron:</div>
        ${bajaron.map(s=>`<div style="font-size:12px;color:var(--text1);padding:4px 0">• <strong>${esc(s.n)}</strong>: ${fmtFull(s.d)}</div>`).join('')}
      </div>`;
    }
    h+=`</div>`;
  } else {
    h+=`<div class="empty"><div class="empty-i">📊</div><div class="empty-t">Sin datos para comparar</div></div>`;
  }

  return h+'</div>';
}

function setCmp(slot,v){const [m,y]=v.split('_').map(Number);if(slot==='A'){window._cmpA=m;window._cmpAY=y;}else{window._cmpB=m;window._cmpBY=y;}renderGastos();}

function saveNG(){
  const c=document.getElementById('gc')?.value;

  const desc=document.getElementById('gd')?.value.trim();
  const m=parseInt(document.getElementById('gm')?.value);
  const y=parseInt(document.getElementById('gy')?.value)||curY;
  const f=document.getElementById('gf')?.value.trim();
  if(!v||v<=0){tst('Ingresá un monto válido');return;}
  gastos.push({_id:Date.now(),c,v,desc,m,y,f});S.s('gst4',gastos);

}
function delGasto(id){gastos=gastos.filter(g=>g._id!==id);S.s('gst4',gastos);tst('Eliminado');renderGastos();}

function rCompras(){
  const pend=shopList.filter(x=>!x.done);
  const done=shopList.filter(x=>x.done);
  let h=`<div class="sec">`;
  // Encabezado
  h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <div style="width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,rgba(16,210,155,.18),rgba(255,192,98,.18));border:1px solid var(--green-b);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">🛒</div>

    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input class="inp" id="shop-inp" placeholder="Ej: 2kg de pollo" style="flex:1" onkeydown="if(event.key==='Enter')addShopItem()">

      <button class="btn b-md b-p" onclick="addShopItem()" style="flex-shrink:0">➕ Agregar</button>
    </div>
    ${aiKey()&&(nutData&&nutData.weeklyPlan)?`<button class="btn b-md b-blu" style="width:100%;margin-top:8px" onclick="shopFromPlan()">✨ Generar lista desde mi plan de comidas</button>`:''}

  if(pend.length){

      if(!items.length)return;
      const m=SHOP_CATS[cat];
      h+=`<div style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:700;color:${m.color};margin-bottom:6px">${m.emoji} ${m.label}</div>`;
      items.forEach(it=>{
        h+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-sm);margin-bottom:6px">
          <button onclick="toggleShop('${it.id}')" style="width:22px;height:22px;border-radius:6px;border:2px solid var(--border3);background:none;flex-shrink:0"></button>
          <div style="flex:1;font-size:13px">${esc(it.t)}</div>
          <button onclick="delShop('${it.id}')" style="color:var(--text3);font-size:16px;flex-shrink:0">×</button>

      h+=`</div>`;
    });

    h+=`<div class="card" style="text-align:center;padding:24px">
      <div style="font-size:26px;margin-bottom:6px">🛒</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.5">La lista está vacía.<br>Agregá productos o generala desde tu plan de comidas.</div>
    </div>`;

  if(done.length){
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin:16px 0 8px">
      <div class="sec-t" style="margin:0">✓ En el carro (${done.length})</div>
      <button class="btn b-xs b-g" onclick="clearShopDone()" style="color:var(--red)">Vaciar comprados</button>

    done.forEach(it=>{
      const m=SHOP_CATS[it.cat]||SHOP_CATS.otro;
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg1);border-radius:var(--r-sm);margin-bottom:5px;opacity:.6">
        <button onclick="toggleShop('${it.id}')" style="width:22px;height:22px;border-radius:6px;border:2px solid var(--green);background:var(--green);color:#fff;flex-shrink:0;font-size:13px">✓</button>

function addShopItem(){
  const inp=document.getElementById('shop-inp');const t=inp?.value.trim();
  if(!t)return;
  const cat=document.getElementById('shop-cat')?.value||'otro';
  shopList.push({id:uid(),t,cat,done:false,ts:Date.now()});
  S.s('shop1',shopList);
  if(inp)inp.value='';
  renderGastos();
  setTimeout(()=>document.getElementById('shop-inp')?.focus(),50);
}
function toggleShop(id){
  const it=shopList.find(x=>x.id===id);
  if(it){it.done=!it.done;S.s('shop1',shopList);renderGastos();}
}
function delShop(id){
  shopList=shopList.filter(x=>x.id!==id);
  S.s('shop1',shopList);renderGastos();
}
function clearShopDone(){
  shopList=shopList.filter(x=>!x.done);
  S.s('shop1',shopList);renderGastos();
  tst('🛒 Carro vaciado');
}
async function shopFromPlan(){
  const key=aiKey();if(!key){tst('Configurá la IA');return;}
  const plan=nutData&&nutData.weeklyPlan;
  if(!plan){tst('Generá primero tu plan de comidas en Nutrición');return;}
  const btn=document.querySelector('[onclick="shopFromPlan()"]');
  if(btn){btn.textContent='⏳ Armando lista…';btn.disabled=true;}
  try{
    const plano=plan.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,2500);
    const prompt='A partir de este plan de comidas semanal, armá una lista de compras de supermercado con los ingredientes necesarios, agrupados por sector. Respondé SOLO con JSON sin texto extra ni markdown, con esta forma: {"items":[{"t":"2kg de pollo","cat":"carniceria"}]}. La categoría debe ser una de: verduleria, carniceria, almacen, lacteos, limpieza, bebidas, otro. Juntá cantidades de ingredientes repetidos. Plan:\n'+plano;
    const raw=await _aiComplete(prompt);
    const m=raw.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('No se pudo generar la lista');
    const obj=JSON.parse(m[0]);
    const items=obj.items||[];
    if(!items.length)throw new Error('La lista vino vacía');
    let added=0;
    items.forEach(it=>{
      const t=(it.t||'').trim();if(!t)return;
      const cat=SHOP_CATS[it.cat]?it.cat:'otro';
      // evitar duplicados exactos pendientes
      if(shopList.some(x=>!x.done&&x.t.toLowerCase()===t.toLowerCase()))return;
      shopList.push({id:uid(),t,cat,done:false,ts:Date.now()});added++;
    });
    S.s('shop1',shopList);
    renderGastos();
    tst('🛒 '+added+' productos agregados');
  }catch(e){tst('Error: '+e.message,4000);if(btn){btn.textContent='✨ Generar lista desde mi plan de comidas';btn.disabled=false;}}
}

function saveEvent(){
  const title=(document.getElementById('ev-title')?.value||'').trim();

  if(!title){tst('Escribí un título para el evento');return;}
  if(!date){tst('Seleccioná una fecha');return;}
  events.push({id:uid(),title,date,time,reminder,notified:false});
  sortEvents();S.s('evts1',events);
  if(reminder>0)scheduleNotif(events[events.length-1]);
  tst(`✓ "${title}" agendado`);aTab(0);
}

function delEvent(id){

}

// ── NOTIFICACIONES ──
function pedirPermisoNotif(){
  if(!("Notification" in window)){tst('Tu navegador no soporta notificaciones');return;}
  Notification.requestPermission().then(p=>{
    if(p==='granted'){tst('🔔 Recordatorios activados');try{new Notification('MARTIN·APP',{body:'¡Listo! Te voy a avisar de tus eventos.'});}catch(e){}}
    else if(p==='denied')tst('Quedaron bloqueadas. Activalas desde el navegador.',4000);
    renderAgenda();
  });
}
function startNotifCheck(){
  if(notifInterval)clearInterval(notifInterval);
  if(!("Notification" in window))return;
  checkEvents(); // chequeo inmediato al abrir (catch-up)
  notifInterval=setInterval(checkEvents,10000);
  // Al volver a la app (desbloquear/cambiar de pestaña) revisar de nuevo
  if(!window._notifVisHook){
    window._notifVisHook=true;
    document.addEventListener('visibilitychange',()=>{if(!document.hidden)checkEvents();});
  }
}

function checkEvents(){
  if(!events.length)return;
  if(!("Notification" in window)||Notification.permission!=='granted')return;
  const now=new Date();
  let changed=false;
  events.forEach(e=>{
    if(e.notified||!e.reminder)return;
    const [ey,em,ed]=e.date.split('-').map(Number);
    const [eh,emin]=e.time?e.time.split(':').map(Number):[0,0];
    const evTime=new Date(ey,em-1,ed,eh,emin);
    const diff=(evTime-now)/60000; // minutos hasta el evento
    // Avisar si estamos dentro de la ventana del recordatorio (incluye eventos
    // que ya pasaron hace poco y no se avisaron, mientras la app estaba cerrada)
    if(diff<=e.reminder&&diff>=-120&&!e.notified){
      e.notified=true;changed=true;
      const cuando=diff>=1?`en ${Math.round(diff)} min`:(diff>=-1?'ahora':`hace ${Math.abs(Math.round(diff))} min`);
      try{
        new Notification('📅 '+e.title,{body:`${e.time||''} hs · ${cuando}`,tag:'ev-'+e.id});
      }catch(err){}
      // refuerzo visible dentro de la app
      tst('🔔 '+e.title+' · '+cuando,5000);
    }
  });
  if(changed)S.s('evts1',events);
}

function scheduleNotif(e){
  if(!e.reminder||!("Notification" in window))return;
  if(Notification.permission==='default')pedirPermisoNotif();
}

var curChatTab=0;
var chatSessions=S.g('chatSessions',[]);
var activeChatId=S.g('activeChatId',null);
var chatHist=[];
// Migración desde chat1 (hilo único) → multi-sesión
(function(){
  const old=S.g('chat1',[]);
  if(old.length&&!chatSessions.length){
    const id=uid();
    chatSessions.push({id,titulo:'Conversación '+new Date().toLocaleDateString('es-UY'),createdAt:Date.now(),updatedAt:Date.now(),mensajes:old});
    activeChatId=id;
    S.s('chatSessions',chatSessions);
    S.s('activeChatId',activeChatId);
  }
  if(!chatSessions.length){
    // Crear primera sesión vacía
    const id=uid();
    chatSessions.push({id,titulo:'Conversación '+new Date().toLocaleDateString('es-UY'),createdAt:Date.now(),updatedAt:Date.now(),mensajes:[]});
    activeChatId=id;
    S.s('chatSessions',chatSessions);
    S.s('activeChatId',activeChatId);
  }
  // Apuntar chatHist a la sesión activa
  const s=chatSessions.find(s=>s.id===activeChatId);
  if(s) chatHist=s.mensajes;
  else {
    // fallback a la más reciente
    const last=chatSessions[chatSessions.length-1];
    activeChatId=last.id;
    chatHist=last.mensajes;
    S.s('activeChatId',activeChatId);
  }
})();

function saveChat(){
  const s=chatSessions.find(s=>s.id===activeChatId);
  if(s){s.mensajes=chatHist;s.updatedAt=Date.now();S.s('chatSessions',chatSessions);}
}
function switchSession(id){
  const old=chatSessions.find(s=>s.id===activeChatId);
  if(old)generarResumenSesion(old,'asistente');
  const s=chatSessions.find(s=>s.id===id);
  if(!s) return;
  activeChatId=id;
  chatHist=s.mensajes;
  S.s('activeChatId',id);
  cOv1();
  renderChat();
}
function newSession(){
  const old=chatSessions.find(s=>s.id===activeChatId);
  if(old)generarResumenSesion(old,'asistente');
  const id=uid();
  chatSessions.push({id,titulo:'Conversación '+new Date().toLocaleDateString('es-UY'),createdAt:Date.now(),updatedAt:Date.now(),mensajes:[]});
  activeChatId=id;
  chatHist=chatSessions.find(s=>s.id===id).mensajes;
  S.s('chatSessions',chatSessions);
  S.s('activeChatId',id);
  renderChat();
}
function deleteSession(id){
  if(!confirm('¿Borrar esta conversación?')) return;
  chatSessions=chatSessions.filter(s=>s.id!==id);
  S.s('chatSessions',chatSessions);
  if(activeChatId===id){
    if(chatSessions.length){
      const last=chatSessions[chatSessions.length-1];
      activeChatId=last.id;
      chatHist=last.mensajes;
      S.s('activeChatId',activeChatId);
    } else {
      // No sessions left, create one
      const nid=uid();
      chatSessions.push({id:nid,titulo:'Conversación '+new Date().toLocaleDateString('es-UY'),createdAt:Date.now(),updatedAt:Date.now(),mensajes:[]});
      activeChatId=nid;
      chatHist=chatSessions[0].mensajes;
      S.s('chatSessions',chatSessions);
      S.s('activeChatId',nid);
    }
  }
  renderChat();
}

  const sorted=[...chatSessions].sort((a,b)=>b.updatedAt-a.updatedAt);

  h+='</div><button class="btn b-lg b-p" style="width:100%;margin-top:14px" onclick="newSession();cOv1()">✏️ Nueva conversación</button>';

  const bubble=document.getElementById('chat-live');

  try{
    const full=await _geminiStream(prompt,key,(chunk,acc)=>{
      stopThinking();
      // mientras llega, ocultamos cualquier bloque [ACCION] a medio escribir
      const visible=acc.split('[ACCION')[0];
      if(bubble){
        bubble.innerHTML=_mdBold(visible)+'<span class="ai-caret">▍</span>';
        const cont=document.querySelector('#chat-b > div:first-child');
        if(cont)cont.scrollTop=cont.scrollHeight;
      }
    });

    // ejecutar acciones embebidas
    let reply=full;
    const actionRegex=/\[ACCION\]([\s\S]*?)\[\/ACCION\]/g;
    let match;const resultados=[];
    while((match=actionRegex.exec(reply))!==null){
      try{resultados.push(ejecutarAccion(JSON.parse(match[1])));}
      catch(e){resultados.push('Error en acción: '+e.message);}
    }
    if(resultados.length){
      reply=reply.replace(/\[ACCION\][\s\S]*?\[\/ACCION\]/g,'').trim();
      if(reply)reply+='\n\n';
      reply+='✅ Acciones ejecutadas:\n'+resultados.map(r=>'• '+r).join('\n');
    }
    chatHist[chatHist.length-1]={role:'assistant',text:reply||'(sin respuesta)'};
    saveChat();
    if(resultados.length){gastos=S.g('gst4',[]);pagosFijos=S.g('pf4',{});pagosEstado=S.g('pe4',{});}
    if(_voiceSent){
      _voiceSent=false;
      const clean=reply.replace(/[✅•⚠️📅📊💪🔴🟢]/g,'').replace(/\*\*(.+?)\*\*/g,'$1').replace(/\n/g,' ').trim();
      speak(clean.slice(0,350));
    }
  }catch(e){
    stopThinking();
    _voiceSent=false;
    tst('⚠️ Error: '+e.message,4000);
    chatHist.pop(); // saca la burbuja vacía
    saveChat();
  }
  stopThinking();
  renderChat();
}
